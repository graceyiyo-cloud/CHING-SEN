<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青森苑 案場管理系統</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>
</head>
<body class="bg-[#F5F5F0]">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Upload, Search, X, Home, User, Phone, MapPin, FileText, DollarSign, Layers, Cloud, RefreshCw, Plus, LogIn, LogOut, AlertCircle } from 'lucide-react';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, signOut } from 'firebase/auth';
    import { getFirestore, doc, setDoc, onSnapshot } from 'firebase/firestore';

    const userFirebaseConfig = {
      apiKey: "AIzaSyDREvduzrja4xjF-RCpKa-qv45JZCw9tjI",
      authDomain: "gen-lang-client-0168131217.firebaseapp.com",
      projectId: "gen-lang-client-0168131217",
      storageBucket: "gen-lang-client-0168131217.firebasestorage.app",
      messagingSenderId: "620488371764",
      appId: "1:620488371764:web:d5eb9d1dff62d66bab2461"
    };

    const firebaseConfig = typeof window !== 'undefined' && window.__firebase_config ? JSON.parse(window.__firebase_config) : userFirebaseConfig;
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    const appId = typeof window !== 'undefined' && window.__app_id ? window.__app_id : 'qingsenyuan-admin';
    const initialAuthToken = typeof window !== 'undefined' && window.__initial_auth_token ? window.__initial_auth_token : null;

    const defaultData = { "請點擊右上角匯入 Excel": [] };

    // ==========================================
    // 通用工具：格式化字串與日期
    // ==========================================
    const normStr = (s) => String(s || '').trim().replace(/\.0$/, '').toUpperCase();

    const renderDateIfApplicable = (key, val) => {
      if (val === undefined || val === null || val === '') return '';
      const sVal = String(val).trim();
      if ((String(key).includes('日') || String(key).includes('時間戳記')) && sVal !== '') {
        const num = Number(sVal);
        if (!isNaN(num) && num > 20000 && num < 80000) {
          const date = new Date(Math.round((num - 25569) * 86400 * 1000));
          return `${date.getUTCFullYear()}/${String(date.getUTCMonth() + 1).padStart(2, '0')}/${String(date.getUTCDate()).padStart(2, '0')}`;
        }
      }
      return sVal;
    };

    const getCategoryStyle = (text) => {
      const s = String(text || '');
      if (s.includes('車位')) return { isCat: true, text: 'text-purple-700', bg: 'bg-purple-50', border: 'border-purple-200' };
      if (s.includes('建物') || s.includes('房屋')) return { isCat: true, text: 'text-sky-700', bg: 'bg-sky-50', border: 'border-sky-200' };
      if (s.includes('土地')) return { isCat: true, text: 'text-amber-700', bg: 'bg-amber-50', border: 'border-amber-200' };
      return { isCat: false, text: 'text-gray-800', bg: 'bg-[#F5F5F0]/50', border: 'border-[#D4C9B9]/20' };
    };

    function App() {
      const [sheetsData, setSheetsData] = useState(defaultData);
      const [activeTab, setActiveTab] = useState("請點擊右上角匯入 Excel");
      const [searchTerm, setSearchTerm] = useState("");
      const [selectedUnit, setSelectedUnit] = useState(null);
      const [isEditingMode, setIsEditingMode] = useState(false);
      const [showAddUnitModal, setShowAddUnitModal] = useState(false);
      
      const [isLoading, setIsLoading] = useState(false);
      const [isLoggingIn, setIsLoggingIn] = useState(false);
      const [loginError, setLoginError] = useState(null);
      const [user, setUser] = useState(null);
      
      const [editingRemitId, setEditingRemitId] = useState(null);
      const [editingRemitData, setEditingRemitData] = useState({ date: '', amt: '' });

      const [firebaseInvoices, setFirebaseInvoices] = useState({});
      const [customData, setCustomData] = useState({ units: {}, remittances: [] });

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (initialAuthToken) await signInWithCustomToken(auth, initialAuthToken);
          } catch (error) { console.error("Firebase Auth Error:", error); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      const handleGoogleLogin = async () => {
        setIsLoggingIn(true);
        setLoginError(null);
        try {
          await signInWithPopup(auth, provider);
        } catch (error) {
          console.error("Login Failed:", error);
          let msg = "登入失敗，請確認 Firebase 設定。";
          if (error.code === 'auth/popup-blocked') msg = "視窗被攔截，請允許彈出視窗。";
          setLoginError(msg);
        } finally { setIsLoggingIn(false); }
      };

      const handleLogout = async () => {
        try {
          await signOut(auth);
          setSheetsData(defaultData);
          setActiveTab("請點擊右上角匯入 Excel");
        } catch (error) { console.error("Logout Failed:", error); }
      };

      useEffect(() => {
        if (!user) return;
        const invoiceDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'invoices', 'all_invoices');
        const unsubInv = onSnapshot(invoiceDocRef, (snapshot) => {
          if (snapshot.exists()) setFirebaseInvoices(snapshot.data());
        });
        const customDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'custom', 'additions');
        const unsubCustom = onSnapshot(customDocRef, (snapshot) => {
          if (snapshot.exists()) setCustomData(snapshot.data());
        });
        return () => { unsubInv(); unsubCustom(); };
      }, [user]);

      // ==========================================
      // 智慧匯入邏輯：處理雙層標題並清理空行
      // ==========================================
      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setIsLoading(true);
        const reader = new FileReader();
        reader.onload = (evt) => {
          const bstr = evt.target.result;
          const wb = window.XLSX.read(bstr, { type: 'binary' });
          const newData = {};
          
          wb.SheetNames.forEach(name => {
            const ws = wb.Sheets[name];
            const rawData = window.XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
            if (rawData.length === 0) return;

            let headerRowIdx = 0;
            for (let i = 0; i < Math.min(10, rawData.length); i++) {
              const rowStr = rawData[i].join('').toLowerCase();
              if (rowStr.includes('樓層') || rowStr.includes('編號') || rowStr.includes('戶別') || rowStr.includes('戶名')) {
                headerRowIdx = i; break;
              }
            }
            
            const headerRow = rawData[headerRowIdx] || [];
            const cleanHeaders = [];
            const seen = {};
            
            for (let c = 0; c < headerRow.length; c++) {
               let base = headerRow[c] ? String(headerRow[c]).replace(/[\r\n\s]+/g, '').trim() : `__EMPTY_${c}`;
               let superCat = "";
               if (headerRowIdx > 0) {
                   for(let upC = c; upC >= 0; upC--) {
                       let val = rawData[headerRowIdx-1][upC];
                       if (val && String(val).trim() !== "" && !String(val).includes('青森苑')) {
                           superCat = String(val).replace(/[\r\n\s]+/g, '').trim(); break;
                       }
                   }
               }
               let finalCat = base;
               if (!base.startsWith('__EMPTY') && superCat && (superCat.includes('土地') || superCat.includes('建物') || superCat.includes('車位') || superCat.includes('房屋'))) {
                   if (!base.includes(superCat)) finalCat = `${superCat}-${base}`;
               }
               if (seen[finalCat]) { seen[finalCat]++; finalCat = `${finalCat}_${seen[finalCat]}`; } else { seen[finalCat] = 1; }
               cleanHeaders.push(finalCat);
            }

            const sheetJson = [];
            for (let r = headerRowIdx + 1; r < rawData.length; r++) {
              const rowArr = rawData[r];
              if (!rowArr || rowArr.length === 0) continue;
              const rowObj = {};
              for (let c = 0; c < cleanHeaders.length; c++) { rowObj[cleanHeaders[c]] = rowArr[c] || ""; }
              // 只要該列有除了樓層編號以外的任何資料才加入
              if (Object.values(rowObj).some(val => String(val).trim() !== "")) sheetJson.push(rowObj);
            }
            if (sheetJson.length > 0) newData[name] = sheetJson;
          });
          
          if (Object.keys(newData).length > 0) {
            setSheetsData(newData);
            setActiveTab(Object.keys(newData)[0]);
          }
          setIsLoading(false);
        };
        reader.readAsBinaryString(file);
      };

      const combinedData = useMemo(() => {
        let base = sheetsData[activeTab] ? [...sheetsData[activeTab]] : []; 
        if (customData && customData.units) {
            Object.keys(customData.units).forEach(key => {
                const cu = customData.units[key];
                if (!cu || !cu.基本資料) return;
                const f = cu.基本資料.樓層, u = cu.基本資料.編號, b = cu.基本資料.買方;
                const exists = base.find(r => normStr(r['樓層']) === normStr(f) && normStr(r['編號']) === normStr(u));
                if (!exists) { base.push({ '樓層': f, '編號': u, '買方': b, '_isCustom': true }); }
                else if (b) { exists['買方'] = b; }
            });
        }
        return base.filter(row => {
          if (!searchTerm) return true;
          return Object.values(row).some(val => String(val).toLowerCase().includes(searchTerm.toLowerCase()));
        });
      }, [sheetsData, activeTab, searchTerm, customData]);

      // ==========================================
      // 關鍵修復：針對坪數分頁進行「空行過濾」
      // ==========================================
      const filteredDisplayData = useMemo(() => {
        let data = combinedData;
        if (activeTab.includes('坪數') || activeTab.includes('車位')) {
          data = data.filter(row => {
            // 找出除了 基本識別資訊 以外的所有欄位
            const contentKeys = Object.keys(row).filter(k => 
              !['樓層', '編號', '買方', '_isCustom'].includes(k) && !k.startsWith('__EMPTY')
            );
            // 只要有一個欄位是有值的，這行就要顯示
            return contentKeys.some(k => String(row[k]).trim() !== "");
          });
        }
        return data;
      }, [combinedData, activeTab]);

      const currentColumns = useMemo(() => {
        if (filteredDisplayData.length === 0) return [];
        const cols = new Set();
        filteredDisplayData.forEach(row => Object.keys(row).forEach(k => { if(k !== '_isCustom') cols.add(k) }));
        let colArray = Array.from(cols);
        if (activeTab.includes('匯款')) {
           const dateCol = colArray.find(c => c.includes('日期')), unitCol = colArray.find(c => c.includes('戶別') || c.includes('編號')), amtCol = colArray.find(c => c.includes('金額'));
           return [dateCol, unitCol, amtCol].filter(Boolean); 
        }
        return colArray;
      }, [filteredDisplayData, activeTab]);

      const mergeCols = ['樓層', '編號', '買方', '成交總價'];
      const rowSpans = useMemo(() => {
          const spans = {};
          if (activeTab.includes('匯款') || activeTab.includes('換約') || activeTab.includes('聯絡') || activeTab.includes('客戶') || activeTab.includes('坪數')) return spans;
          filteredDisplayData.forEach(row => {
              const key = `${normStr(row['樓層'])}_${normStr(row['編號'])}`;
              spans[key] = (spans[key] || 0) + 1;
          });
          return spans;
      }, [filteredDisplayData, activeTab]);

      const columnTotals = useMemo(() => {
          const totals = {};
          if (activeTab.includes('匯款') || activeTab.includes('換約') || activeTab.includes('聯絡') || activeTab.includes('客戶') || activeTab.includes('坪數')) return totals;
          currentColumns.forEach(col => {
              if (mergeCols.includes(col) && col !== '成交總價') return;
              let sum = 0, hasVal = false;
              filteredDisplayData.forEach((row, idx) => {
                  if (col === '成交總價') {
                     const prevKey = idx > 0 ? `${normStr(filteredDisplayData[idx-1]['樓層'])}_${normStr(filteredDisplayData[idx-1]['編號'])}` : null;
                     if (`${normStr(row['樓層'])}_${normStr(row['編號'])}` === prevKey) return;
                  }
                  const val = row[col];
                  if (val !== undefined && val !== null && String(val).trim() !== '') {
                     const num = parseFloat(String(val).replace(/,/g, ''));
                     if (!isNaN(num)) { sum += num; hasVal = true; }
                  }
              });
              if (hasVal) totals[col] = sum;
          });
          return totals;
      }, [filteredDisplayData, currentColumns, activeTab]);

      const parseUnitInfo = (row) => {
        let f = row['樓層'], u = row['編號'], b = row['買方'] || row['姓名'] || row['匯款人'] || '';
        if (!f && !u) {
          const combined = String(row['戶別'] || row['戶名'] || '').replace(/\s/g, '');
          const match = combined.match(/^(\d+)[樓Ff]?(.*)$/i);
          if (match) { f = match[1]; u = match[2]; } else u = combined;
        }
        return { f: normStr(f), u: normStr(u), b: String(b).trim() };
      };

      const openUnitDetails = (targetF, targetU, defaultBuyer) => {
        const unitKey = `${targetF}_${targetU}`;
        const info = { 基本資料: { 樓層: targetF, 編號: targetU, 買方: defaultBuyer }, 財務款項: { house: {}, land: {} }, 客戶資料: {}, 坪數車位: {}, 匯款紀錄: [], 換約紀錄: [], 其他標籤: [] };
        Object.keys(sheetsData).forEach(sheetName => {
          const sheet = sheetsData[sheetName];
          if (sheetName.includes("匯款")) {
            info.匯款紀錄.push(...sheet.filter(r => { const unitStr = normStr(r['戶別']).replace(/\s/g, ''); return unitStr === `${targetF}樓${targetU}` || unitStr === `${targetF}F${targetU}` || unitStr === `${targetF}${targetU}`; }));
            return; 
          }
          if (sheetName.includes("換約") || sheetName.includes("讓渡")) {
            info.換約紀錄.push(...sheet.filter(r => { const unitStr = normStr(r['戶名'] || r['戶別'] || r['編號']).replace(/\s/g, ''); return unitStr === `${targetF}${targetU}` || unitStr === `${targetF}樓${targetU}` || unitStr === `${targetF}F${targetU}`; }));
            return; 
          }
          const matches = sheet.filter(r => normStr(r['樓層']) === targetF && normStr(r['編號']) === targetU);
          if (matches.length > 0) {
            if (sheetName.includes("款項") || sheetName.includes("財務") || sheetName.includes("收款")) { info.財務款項.house = matches.find(m => Object.values(m).some(v => String(v).includes('房屋'))) || matches[0]; info.財務款項.land = matches.find(m => Object.values(m).some(v => String(v).includes('土地'))) || {}; }
            else if (sheetName.includes("客戶") || sheetName.includes("聯絡")) info.客戶資料 = matches[0];
            else if (sheetName.includes("坪數") || sheetName.includes("車位")) info.坪數車位 = matches[0];
            else info.其他標籤.push({ sheetName, data: matches });
          }
        });
        const cu = customData.units?.[unitKey];
        if (cu) { if (cu.基本資料?.買方) info.基本資料.買方 = cu.基本資料.買方; info.客戶資料 = { ...info.客戶資料, ...cu.客戶資料 }; info.坪數車位 = { ...info.坪數車位, ...cu.坪數車位 }; info.財務款項.house = { ...info.財務款項.house, ...cu.house }; info.財務款項.land = { ...info.財務款項.land, ...cu.land }; }
        info.匯款紀錄.push(...(customData.remittances || []).filter(r => r.unitKey === unitKey));
        setSelectedUnit(info);
      };

      const handleUpdateCustomUnit = async (category, key, value) => {
         const unitKey = `${selectedUnit.基本資料.樓層}_${selectedUnit.基本資料.編號}`;
         const currentUnitCustom = customData.units?.[unitKey] || { 基本資料:{}, 客戶資料:{}, 坪數車位:{}, house:{}, land:{} };
         const updatedCustomUnits = { ...customData.units, [unitKey]: { ...currentUnitCustom, [category]: { ...(currentUnitCustom[category] || {}), [key]: value } } };
         setCustomData(prev => ({...prev, units: updatedCustomUnits}));
         setSelectedUnit(prev => { if (category === 'house' || category === 'land') return { ...prev, 財務款項: { ...prev.財務款項, [category]: { ...prev.財務款項[category], [key]: value } } }; if (category === '基本資料') return { ...prev, 基本資料: { ...prev.基本資料, [key]: value } }; return { ...prev, [category]: { ...prev[category], [key]: value } }; });
         if (user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'custom', 'additions'), { units: updatedCustomUnits }, { merge: true });
      };

      if (!user) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-[#F5F5F0] p-6 font-sans">
            <div className="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden text-center p-10 border border-[#D4C9B9]/30 animate-in fade-in zoom-in-95 duration-500">
               <div className="bg-[#8C9B90] w-16 h-16 rounded-2xl flex items-center justify-center text-white mx-auto mb-6"><Home size={32} /></div>
               <h1 className="text-3xl font-bold text-[#4A4A4A] mb-2 tracking-tight">青森苑管理系統</h1>
               <p className="text-gray-400 mb-10 text-sm">請使用 Google 帳號登入系統</p>
               {loginError && <div className="mb-6 p-4 bg-red-50 border border-red-100 rounded-xl flex items-start gap-3 text-left"><AlertCircle className="text-red-500 shrink-0 mt-0.5" size={18} /><div><p className="text-red-800 text-[11px] leading-relaxed">{loginError}</p></div></div>}
               <button onClick={handleGoogleLogin} disabled={isLoggingIn} className="w-full flex items-center justify-center gap-3 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-medium py-3 px-6 rounded-xl transition-all shadow-sm active:scale-95 disabled:opacity-50">{isLoggingIn ? <RefreshCw size={20} className="animate-spin text-gray-400" /> : <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" />}{isLoggingIn ? '連線中...' : '使用 Google 帳號登入'}</button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#F5F5F0] text-[#4A4A4A] font-sans selection:bg-[#8C9B90] selection:text-white pb-10">
          <header className="bg-white shadow-sm border-b border-[#D4C9B9]/50 sticky top-0 z-10">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
              <div className="flex flex-col sm:flex-row items-center gap-3">
                <div className="flex items-center gap-3"><div className="bg-[#8C9B90] p-2 rounded-lg text-white"><Home size={24} /></div><h1 className="text-2xl font-bold tracking-wider text-[#4A4A4A]">青森苑<span className="text-[#8C9B90] text-sm ml-2 font-normal">案場管理系統</span></h1></div>
                <div className="ml-2 px-3 py-1 bg-green-50 text-green-700 rounded-full flex items-center gap-1.5 border border-green-100 shadow-sm"><Cloud size={14} /><span className="text-xs font-semibold">雲端同步中</span></div>
              </div>
              <div className="flex flex-wrap items-center justify-center md:justify-end gap-3 w-full md:w-auto">
                <div className="relative flex-grow sm:flex-grow-0"><Search className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={18} /><input type="text" placeholder="搜尋..." className="w-full sm:w-48 lg:w-64 pl-10 pr-4 py-2 bg-[#F5F5F0] border border-transparent focus:border-[#8C9B90] rounded-full text-sm outline-none transition-all" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} /></div>
                <button onClick={() => setShowAddUnitModal(true)} className="flex items-center gap-1.5 bg-white border border-[#8C9B90] text-[#8C9B90] hover:bg-[#8C9B90] hover:text-white px-4 py-2 rounded-full text-sm transition-colors shadow-sm"><Plus size={16} /> 雲端新增</button>
                <label className="cursor-pointer flex items-center gap-2 bg-[#8C9B90] hover:bg-[#7A8A7E] text-white px-4 py-2 rounded-full text-sm transition-colors shadow-sm"><Upload size={16} />匯入 Excel<input type="file" accept=".xlsx, .xls, .csv" className="hidden" onChange={handleFileUpload} /></label>
                <div className="flex items-center gap-2 pl-2 border-l border-gray-100 ml-1"><div className="w-8 h-8 rounded-full overflow-hidden border border-gray-200"><img src={user.photoURL || 'https://www.gravatar.com/avatar?d=mp'} className="w-full h-full object-cover" /></div><button onClick={handleLogout} className="p-2 text-gray-400 hover:text-red-500 rounded-full transition-all"><LogOut size={20} /></button></div>
              </div>
            </div>
          </header>

          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div className="flex overflow-x-auto pb-2 mb-4 scrollbar-hide gap-2 border-b border-gray-200">
              {Object.keys(sheetsData).map(tab => (
                <button key={tab} onClick={() => setActiveTab(tab)} className={`px-6 py-2.5 rounded-t-lg font-medium text-sm transition-all whitespace-nowrap ${ activeTab === tab ? 'bg-white text-[#8C9B90] border-t-2 border-l border-r border-[#8C9B90] shadow-[0_4px_0_0_white_inset]' : 'text-gray-500 hover:text-[#8C9B90] hover:bg-white/50 border-transparent border-t-2' }`}>{tab}</button>
              ))}
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-[#D4C9B9]/30 overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse">
                  <thead className="bg-[#F9F9F8] border-b border-[#D4C9B9]/50">
                    <tr>
                      <th className="px-4 py-3 text-xs font-semibold text-gray-500 uppercase sticky left-0 bg-[#F9F9F8] z-10 w-16 text-center">操作</th>
                      {currentColumns.map((col, i) => {
                        const style = getCategoryStyle(col);
                        return <th key={i} className={`px-4 py-3 text-xs font-semibold uppercase whitespace-nowrap ${style.isCat ? style.text : 'text-gray-500'}`}>{col.startsWith('__EMPTY') ? '' : col}</th>;
                      })}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100">
                    {filteredDisplayData.length > 0 ? (
                      filteredDisplayData.map((row, idx) => {
                        const unit = parseUnitInfo(row); const unitKey = `${unit.f}_${unit.u}`; const isMerged = Object.keys(rowSpans).length > 0;
                        const isFirst = !isMerged || unitKey !== (idx > 0 ? `${parseUnitInfo(filteredDisplayData[idx-1]).f}_${parseUnitInfo(filteredDisplayData[idx-1]).u}` : null);
                        const span = isMerged ? rowSpans[unitKey] : 1;
                        const catStr = row['房48%      土52%'] || row['款項種類'] || '';
                        return (
                          <tr key={idx} className={`hover:bg-[#F5F5F0]/50 transition-colors ${!unit.b ? 'opacity-60 bg-gray-50/50' : ''}`}>
                            {(!isMerged || isFirst) && ( <td rowSpan={span} className="px-4 py-3 whitespace-nowrap sticky left-0 bg-inherit z-10 border-r border-gray-100 text-center align-middle"><button onClick={() => openUnitDetails(unit.f, unit.u, unit.b)} className="text-xs bg-[#D4C9B9] hover:bg-[#c3b6a3] text-white px-3 py-1.5 rounded transition-all shadow-sm">檢視</button></td> )}
                            {currentColumns.map((col, i) => {
                              let cls = 'text-gray-600';
                              if (col.includes('買方')) cls = 'font-medium text-[#8C9B90]';
                              else { const s = getCategoryStyle((col.includes('土地') || col.includes('建物') || col.includes('車位')) ? col : catStr); if (s.isCat) cls = `${s.text} font-medium`; }
                              if (isMerged && mergeCols.includes(col)) { if (!isFirst) return null; return <td key={i} rowSpan={span} className={`px-4 py-3 align-middle whitespace-nowrap text-sm ${cls}`}>{renderDateIfApplicable(col, row[col])}</td>; }
                              return <td key={i} className={`px-4 py-3 whitespace-nowrap text-sm ${cls}`}>{renderDateIfApplicable(col, row[col])}</td>;
                            })}
                          </tr>
                        );
                      })
                    ) : ( <tr><td colSpan={currentColumns.length + 1} className="px-4 py-12 text-center text-gray-400 italic">尚未匯入資料或該分頁無對應內容。</td></tr> )}
                    {Object.keys(columnTotals).length > 0 && (
                      <tr className="bg-[#E8ECE9] border-t-2 border-[#8C9B90]">
                        <td className="px-4 py-4 sticky left-0 bg-[#E8ECE9] z-10 border-r border-[#8C9B90]/30 text-center font-bold">合計</td>
                        {currentColumns.map((col, i) => {
                          if (['樓層', '編號', '買方'].includes(col)) return <td key={i} className="text-center font-bold">-</td>;
                          const t = columnTotals[col]; return <td key={i} className={`px-4 py-4 text-right font-bold ${col === '成交總價' ? 'text-[#8C9B90] text-base' : ''}`}>{t !== undefined ? t.toLocaleString() : ''}</td>;
                        })}
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          {showAddUnitModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
              <div className="bg-white p-6 rounded-xl w-80 shadow-2xl"><h3 className="font-bold mb-4 text-[#8C9B90]">建立成交戶</h3><input id="new_u_f" className="border w-full mb-3 p-2 rounded text-sm" placeholder="樓層" /><input id="new_u_u" className="border w-full mb-4 p-2 rounded text-sm" placeholder="編號" /><div className="flex justify-end gap-2"><button onClick={() => setShowAddUnitModal(false)} className="px-4 py-2 text-gray-400 text-sm">取消</button><button onClick={() => { const f = document.getElementById('new_u_f').value, u = document.getElementById('new_u_u').value; if(f && u) { const k = `${normStr(f)}_${normStr(u)}`; const cu = { ...customData.units, [k]: { 基本資料: { 樓層: normStr(f), 編號: normStr(u), 買方: "新客戶" } } }; setCustomData(p => ({ ...p, units: cu })); if (user) setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'custom', 'additions'), { units: cu }, { merge: true }); setShowAddUnitModal(false); openUnitDetails(normStr(f), normStr(u), "新客戶"); setIsEditingMode(true); } }} className="bg-[#8C9B90] text-white px-4 py-2 rounded text-sm">建立</button></div></div>
            </div>
          )}

          {selectedUnit && (
            <div className="fixed inset-0 z-40 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm transition-opacity">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl max-h-[90vh] flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                <div className="flex justify-between items-center px-6 py-4 border-b bg-[#F9F9F8]"><div className="flex items-center gap-4"><div className="bg-[#8C9B90] text-white text-xl font-bold h-12 px-3 rounded-xl flex items-center justify-center">{selectedUnit.基本資料.樓層}{selectedUnit.基本資料.編號}</div><div>{isEditingMode ? <input className="text-xl font-bold border-b border-[#8C9B90] outline-none" value={selectedUnit.基本資料.買方 || ''} onChange={(e) => handleUpdateCustomUnit('基本資料', '買方', e.target.value)} /> : <h2 className="text-xl font-bold">{selectedUnit.基本資料.買方 || '無買方資料'}</h2>}</div></div><div className="flex gap-2"><button onClick={() => setIsEditingMode(!isEditingMode)} className={`px-4 py-2 rounded-full text-xs font-bold ${isEditingMode ? 'bg-orange-100 text-orange-600' : 'bg-gray-100'}`}>{isEditingMode ? '儲存退出' : '編輯資料'}</button><button onClick={() => { setSelectedUnit(null); setIsEditingMode(false); }} className="text-gray-400 p-2"><X size={24} /></button></div></div>
                <div className="flex-1 overflow-y-auto p-6 bg-gray-50/50">
                  {(() => {
                    const pk = Object.entries(selectedUnit.坪數車位 || {}).filter(([k,v]) => !['樓層','編號','買方'].includes(k) && !k.startsWith('__EMPTY') && String(v).trim() !== "");
                    return (
                      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className={`bg-white p-5 rounded-xl border shadow-sm ${pk.length === 0 && !isEditingMode ? 'lg:col-span-2' : ''}`}><h3 className="text-sm font-bold text-[#8C9B90] mb-4 border-b pb-2">聯絡資料</h3><div className="space-y-2">{Object.entries(selectedUnit.客戶資料).map(([k,v]) => { if (['樓層','編號','買方'].includes(k) || k.startsWith('__EMPTY')) return null; return <div key={k} className="flex justify-between text-sm"><span className="text-gray-400">{k}</span><span className="font-medium whitespace-normal break-words">{renderDateIfApplicable(k,v)}</span></div>; })}</div></div>
                        {(pk.length > 0 || isEditingMode) && ( <div className="bg-white p-5 rounded-xl border shadow-sm"><h3 className="text-sm font-bold text-[#8C9B90] mb-4 border-b pb-2">產權配置</h3><div className="grid grid-cols-2 gap-3">{pk.map(([k,v]) => { const s = getCategoryStyle(k); return <div key={k} className={`${s.bg} p-2 rounded border ${s.border}`}><div className={`text-[10px] ${s.text}`}>{k}</div><div className="text-xs font-bold">{renderDateIfApplicable(k,v)}</div></div>; })}</div></div> )}
                        <div className="bg-white p-5 rounded-xl border shadow-sm lg:col-span-2">
                          <h3 className="text-sm font-bold text-[#8C9B90] mb-4 border-b pb-2">款項明細</h3>
                          <div className="overflow-x-auto"><table className="w-full text-xs text-left"><thead><tr className="bg-gray-50"><th>期數</th><th className="text-right text-sky-700">房屋款</th><th className="text-right text-amber-700">土地款</th><th className="text-right">應付合計</th><th className="text-right">已付</th><th className="text-right">餘額</th><th className="text-center">狀態</th></tr></thead>
                          <tbody className="divide-y">{(() => {
                                  const house = selectedUnit.財務款項.house || {}, land = selectedUnit.財務款項.land || {};
                                  const totalP = (selectedUnit.匯款紀錄 || []).reduce((s,r) => s + (parseFloat(String(r['匯款金額']||r['金額']).replace(/,/g,''))||0), 0);
                                  let rem = totalP;
                                  return [ {k:'成交',l:'總價'}, {k:'訂金',l:'訂金'}, {k:'簽約',l:'簽約金'}, {k:'2F',l:'2F'}, {k:'5F',l:'5F'}, {k:'7F',l:'7F'}, {k:'10F',l:'10F'}, {k:'13F',l:'13F'}, {k:'使照',l:'使照'}, {k:'銀貸',l:'銀貸'}, {k:'交屋',l:'交屋'} ].map(st => {
                                    const hA = parseFloat(String(house[Object.keys(house).find(x=>x.includes(st.k) && (st.k==='成交'?!x.includes('總價'):true))]||0).replace(/,/g,''))||0;
                                    const lA = parseFloat(String(land[Object.keys(land).find(x=>x.includes(st.k) && (st.k==='成交'?!x.includes('總價'):true))]||0).replace(/,/g,''))||0;
                                    const exp = hA + lA; if (exp <= 0 && st.k !== '成交') return null;
                                    let paid = 0; if (st.k !== '成交') { if(rem >= exp) { paid = exp; rem -= exp; } else { paid = rem; rem = 0; } }
                                    return <tr key={st.k} className="hover:bg-gray-50"><td>{st.l}</td><td className="text-right text-sky-700 bg-sky-50/10">{hA ? hA.toLocaleString() : ''}</td><td className="text-right text-amber-700 bg-amber-50/10">{lA ? lA.toLocaleString() : ''}</td><td className="text-right font-bold">{exp ? exp.toLocaleString() : ''}</td><td className="text-right text-green-600">{st.k==='成交'?'':paid ? paid.toLocaleString() : ''}</td><td className="text-right text-red-500">{st.k==='成交'?'':(exp-paid) ? (exp-paid).toLocaleString() : ''}</td><td className="text-center">{st.k==='成交'?'':(paid>=exp?'已清':'未清')}</td></tr>;
                                  });
                                })()}</tbody></table></div>
                        </div>
                        <div className="bg-white p-5 rounded-xl border shadow-sm lg:col-span-2">
                          <h3 className="text-sm font-bold text-[#8C9B90] mb-4 border-b pb-2">匯款紀錄</h3>
                          <div className="overflow-x-auto"><table className="w-full text-xs text-left"><thead><tr className="bg-gray-50"><th>日期</th><th className="text-right">金額</th><th className="bg-blue-50/30">發票日期</th><th className="bg-blue-50/30">發票號碼</th></tr></thead>
                          <tbody className="divide-y">{selectedUnit.匯款紀錄.map((r,i) => {
                                  const amt = parseFloat(String(r['匯款金額']||r['金額']).replace(/,/g,''))||0;
                                  const rK = r._isCustom ? r.id : `${r['戶別']||''}_${r['匯款人']||''}_${amt}`;
                                  const cD = firebaseInvoices[rK] || {};
                                  return <tr key={i}><td>{renderDateIfApplicable('日期',r['日期']||r['匯款日期'])}</td><td className="text-right font-bold">{amt.toLocaleString()}</td><td><input type="date" className="border-none bg-transparent" value={cD['發票日期']||''} onChange={e=>handleInvoiceChange(rK,'發票日期',e.target.value)}/></td><td><input type="text" className="border-none bg-transparent w-24" placeholder="號碼" value={cD['發票號碼']||''} onChange={e=>handleInvoiceChange(rK,'發票號碼',e.target.value)}/></td></tr>;
                                })}</tbody></table></div>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
