<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青森苑 案場管理系統</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>
  <style>
    /* 隱藏捲軸但保有功能 */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 核心換行邏輯：超過 20 個字自動折行 */
    .data-cell-wrap {
      white-space: normal !important;
      word-break: break-all !important;
      max-width: 280px; /* 約 20 個中文字寬 */
      min-width: 60px;
    }

    /* 針對數值欄位維持較窄寬度 */
    .num-cell {
      min-width: 80px;
      text-align: right;
    }

    /* 鎖定欄位的陰影效果 */
    .sticky-shadow {
      box-shadow: 2px 0 5px -2px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body class="bg-[#F5F5F0]">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Upload, Search, X, Home, User, Phone, MapPin, FileText, DollarSign, Layers, Cloud, RefreshCw, Plus, LogIn, LogOut, AlertCircle, Trash2, Database, ShieldAlert, ChevronUp, ChevronDown, TrendingUp, CreditCard, Clock } from 'lucide-react';
    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, signOut } from 'firebase/auth';
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, getDocs } from 'firebase/firestore';

    // ==========================================
    // Firebase 初始化
    // ==========================================
    const userFirebaseConfig = {
      apiKey: "AIzaSyDREvduzrja4xjF-RCpKa-qv45JZCw9tjI",
      authDomain: "gen-lang-client-0168131217.firebaseapp.com",
      projectId: "gen-lang-client-0168131217",
      storageBucket: "gen-lang-client-0168131217.firebasestorage.app",
      messagingSenderId: "620488371764",
      appId: "1:620488371764:web:d5eb9d1dff62d66bab2461"
    };

    const firebaseConfig = typeof window !== 'undefined' && window.__firebase_config ? JSON.parse(window.__firebase_config) : userFirebaseConfig;
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    const appId = typeof window !== 'undefined' && window.__app_id ? window.__app_id : 'qingsenyuan-admin';
    const initialAuthToken = typeof window !== 'undefined' && window.__initial_auth_token ? window.__initial_auth_token : null;

    // ==========================================
    // 欄位強制排序清單
    // ==========================================
    const MASTER_COLUMN_ORDER = [
      '樓層', '編號', '買方', '成交總價', 
      '房48%土52%', '房48%      土52%', '款項種類', '成交價', 
      '訂金', '應付簽約金', '應付2F', '應付5F', '應付7F', '應付10F', '應付13F', '應付使照', '應付銀貸', '應付交屋',
      '手機', '郵遞區號', '通訊地址', '備註', '通知寄紙本', '發票寄送',
      '讓渡日期', '戶名', '姓名', '讓渡總價', '合約總價', '換約手續費0.1%', '發票號碼', '新戶'
    ];

    // ==========================================
    // 輔助函式
    // ==========================================
    const normStr = (s) => String(s || '').trim().replace(/\.0$/, '').toUpperCase();
    const cleanStr = (s) => String(s || '').replace(/\s+/g, '');

    const renderDateIfApplicable = (key, val) => {
      if (val === undefined || val === null || val === '') return '';
      const sVal = String(val).trim();
      if ((String(key).includes('日期') || String(key).includes('日') || String(key).includes('時間戳記')) && sVal !== '' && !isNaN(sVal)) {
        const num = Number(sVal);
        if (num > 20000 && num < 80000) {
          const date = new Date(Math.round((num - 25569) * 86400 * 1000));
          return `${date.getUTCFullYear()}/${String(date.getUTCMonth() + 1).padStart(2, '0')}/${String(date.getUTCDate()).padStart(2, '0')}`;
        }
      }
      return sVal;
    };

    const getCategoryStyle = (text) => {
      const s = String(text || '');
      if (s.includes('建物') || s.includes('房屋')) return { isCat: true, text: 'text-sky-700', bg: 'bg-sky-50', border: 'border-sky-200' };
      if (s.includes('土地')) return { isCat: true, text: 'text-amber-700', bg: 'bg-amber-50', border: 'border-amber-200' };
      return { isCat: false, text: 'text-gray-800', bg: 'bg-[#F5F5F0]/50', border: 'border-[#D4C9B9]/20' };
    };

    const parseUnitInfo = (row) => {
      if (!row) return { f: '', u: '', b: '' };
      let f = row['樓層'], u = row['編號'], b = row['買方'] || row['姓名'] || row['匯款人'] || '';
      if (!b) {
        const nameKey = Object.keys(row).find(k => k.includes('匯款人') || k.includes('買方') || k.includes('姓名'));
        if (nameKey) b = row[nameKey];
      }
      if (!f || !u) {
        const combined = String(row['戶別'] || row['戶名'] || row['編號'] || '').replace(/\s/g, '');
        const match = combined.match(/^(\d+)[樓Ff]?(.*)$/i);
        if (match) { f = match[1]; u = match[2]; } else { u = combined; }
      }
      return { f: normStr(f), u: normStr(u), b: String(b || '').trim() };
    };

    const defaultData = { "請點擊右上角匯入 Excel": [] };

    function App() {
      const [sheetsData, setSheetsData] = useState(defaultData);
      const [activeTab, setActiveTab] = useState("請點擊右上角匯入 Excel");
      const [searchTerm, setSearchTerm] = useState("");
      const [selectedUnit, setSelectedUnit] = useState(null);
      const [isEditingMode, setIsEditingMode] = useState(false);
      const [showAddUnitModal, setShowAddUnitModal] = useState(false);
      
      const [isLoading, setIsLoading] = useState(false);
      const [isLoggingIn, setIsLoggingIn] = useState(false);
      const [loginError, setLoginError] = useState(null);
      const [user, setUser] = useState(null);
      const [cloudStatus, setCloudStatus] = useState("idle"); 
      
      const [firebaseInvoices, setFirebaseInvoices] = useState({});
      const [customData, setCustomData] = useState({ units: {}, remittances: [] });

      useEffect(() => {
        const initAuth = async () => {
          try { if (initialAuthToken) await signInWithCustomToken(auth, initialAuthToken); } 
          catch (e) { console.error("Auth Error", e); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        setCloudStatus("loading");
        const unsubInv = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'invoices', 'all_invoices'), (s) => {
          if (s.exists()) setFirebaseInvoices(s.data());
        });
        const unsubCustom = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'custom', 'additions'), (s) => {
          if (s.exists()) setCustomData(s.data());
        });
        const masterColRef = collection(db, 'artifacts', appId, 'public', 'data', 'master_sheets');
        const unsubMaster = onSnapshot(masterColRef, (snapshot) => {
          if (!snapshot.empty) {
            const newSheets = {};
            snapshot.forEach(docSnap => { 
              if (!docSnap.id.match(/坪數|車位/)) {
                newSheets[docSnap.id] = docSnap.data().rows || []; 
              }
            });
            setSheetsData(newSheets);
            setCloudStatus("synced");
            const keys = Object.keys(newSheets);
            if (keys.length > 0 && activeTab === "請點擊右上角匯入 Excel") {
              const mainTab = keys.find(k => k.includes('收款總表')) || keys[0];
              setActiveTab(mainTab);
            }
          } else { setCloudStatus("idle"); }
        }, (err) => { setCloudStatus("error"); });
        return () => { unsubInv(); unsubCustom(); unsubMaster(); };
      }, [user]);

      const handleGoogleLogin = async () => {
        setIsLoggingIn(true); setLoginError(null);
        try { await signInWithPopup(auth, provider); } 
        catch (e) { setLoginError("登入失敗，請確認 Firebase 設定。"); } 
        finally { setIsLoggingIn(false); }
      };

      const handleLogout = async () => {
        await signOut(auth); setSheetsData(defaultData); setActiveTab("請點擊右上角匯入 Excel"); setCloudStatus("idle");
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0]; if (!file) return;
        setIsLoading(true);
        const reader = new FileReader();
        reader.onload = async (evt) => {
          const bstr = evt.target.result;
          const wb = window.XLSX.read(bstr, { type: 'binary' });
          const newData = {};
          wb.SheetNames.forEach(name => {
            if (name.match(/坪數|車位/)) return;
            const ws = wb.Sheets[name];
            const rawData = window.XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
            if (rawData.length === 0) return;
            let hIdx = 0;
            for (let i = 0; i < Math.min(10, rawData.length); i++) {
              if (rawData[i].join('').toLowerCase().match(/樓層|編號|戶別/)) { hIdx = i; break; }
            }
            const cleanHeaders = [];
            const seen = {};
            const headerRow = rawData[hIdx] || [];
            for (let c = 0; c < headerRow.length; c++) {
               let base = headerRow[c] ? String(headerRow[c]).replace(/[\r\n\s]+/g, '').trim() : `__EMPTY_${c}`;
               let final = base;
               if (seen[final]) { seen[final]++; final = `${final}_${seen[final]}`; } else { seen[final] = 1; }
               cleanHeaders.push(final);
            }
            const sheetJson = [];
            for (let r = hIdx + 1; r < rawData.length; r++) {
              const rowArr = rawData[r]; if (!rowArr || rowArr.length === 0) continue;
              const rowObj = {};
              for (let c = 0; c < cleanHeaders.length; c++) { rowObj[cleanHeaders[c]] = rowArr[c] || ""; }
              if (Object.values(rowObj).some(val => String(val).trim() !== "")) sheetJson.push(rowObj);
            }
            if (sheetJson.length > 0) newData[name] = sheetJson;
          });

          if (Object.keys(newData).length > 0) {
            setSheetsData(newData);
            const keys = Object.keys(newData);
            setActiveTab(keys.find(k => k.includes('收款總表')) || keys[0]);
            if (user) {
              setCloudStatus("loading");
              try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'master_sheets');
                const oldDocs = await getDocs(colRef);
                for (const d of oldDocs.docs) { await deleteDoc(d.ref); }
                for (const sheetName of Object.keys(newData)) {
                  const safeName = sheetName.replace(/\//g, '_');
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'master_sheets', safeName), { rows: JSON.parse(JSON.stringify(newData[sheetName])) });
                }
                setCloudStatus("synced");
              } catch (err) { setCloudStatus("error"); }
            }
          }
          setIsLoading(false);
        };
        reader.readAsBinaryString(file);
      };

      const projectStats = useMemo(() => {
        let totalSales = 0;
        let totalReceived = 0;
        const salesTabKey = Object.keys(sheetsData).find(k => k.includes('收款總表'));
        if (salesTabKey) {
          const seenUnits = new Set();
          sheetsData[salesTabKey].forEach(row => {
            const unitKey = `${normStr(row['樓層'])}_${normStr(row['編號'])}`;
            if (!seenUnits.has(unitKey) && row['成交總價']) {
              totalSales += parseFloat(String(row['成交總價']).replace(/,/g, '')) || 0;
              seenUnits.add(unitKey);
            }
          });
        }
        Object.keys(sheetsData).forEach(name => {
          if (name.includes('匯款')) {
            sheetsData[name].forEach(row => {
              const aK = Object.keys(row).find(k => k.includes('金額')) || '金額';
              totalReceived += parseFloat(String(row[aK]).replace(/,/g, '')) || 0;
            });
          }
        });
        (customData.remittances || []).forEach(r => { totalReceived += parseFloat(String(r.匯款金額)) || 0; });
        return { total: totalSales, received: totalReceived, outstanding: totalSales - totalReceived };
      }, [sheetsData, customData]);

      const combinedData = useMemo(() => {
        let base = sheetsData[activeTab] ? [...sheetsData[activeTab]] : []; 
        if (customData?.units) {
          Object.keys(customData.units).forEach(key => {
            const cu = customData.units[key]; if (!cu?.基本資料) return;
            const f = cu.基本資料.樓層, u = cu.基本資料.編號, b = cu.基本資料.買方;
            const exists = base.find(r => normStr(r['樓層']) === normStr(f) && normStr(r['編號']) === normStr(u));
            if (!exists) base.push({ '樓層': f, '編號': u, '買方': b, '_isCustom': true });
            else if (b) exists['買方'] = b;
          });
        }
        return base.filter(row => !searchTerm || Object.values(row).some(v => String(v).toLowerCase().includes(searchTerm.toLowerCase())));
      }, [sheetsData, activeTab, searchTerm, customData]);

      const filteredDisplayData = useMemo(() => {
        let data = combinedData;
        if (activeTab.match(/換約|讓渡/)) {
          data = data.filter(row => {
            const contentKeys = Object.keys(row).filter(k => !['編號', '序號', '_isCustom'].includes(k) && !k.startsWith('__EMPTY'));
            return contentKeys.some(k => String(row[k]).trim() !== "" && String(row[k]) !== "-");
          });
        }
        return data;
      }, [combinedData, activeTab]);

      const transferUnitKeys = useMemo(() => {
        const keys = new Set();
        Object.keys(sheetsData).forEach(sN => {
          if (sN.match(/換約|讓渡/)) {
            sheetsData[sN].forEach(row => {
              const info = parseUnitInfo(row);
              if (info.f || info.u) keys.add(`${info.f}_${info.u}`);
            });
          }
        });
        return keys;
      }, [sheetsData]);

      const currentColumns = useMemo(() => {
        if (filteredDisplayData.length === 0) return [];
        const cols = new Set();
        filteredDisplayData.forEach(row => {
          Object.keys(row).forEach(k => { if(k !== '_isCustom' && !k.startsWith('__EMPTY') && !k.includes('驗證')) cols.add(k); });
        });
        let arr = Array.from(cols);
        arr.sort((a, b) => {
          const cleanA = cleanStr(a), cleanB = cleanStr(b);
          const idxA = MASTER_COLUMN_ORDER.findIndex(m => cleanA.includes(cleanStr(m)) || cleanStr(m).includes(cleanA));
          const idxB = MASTER_COLUMN_ORDER.findIndex(m => cleanB.includes(cleanStr(m)) || cleanStr(m).includes(cleanB));
          if (idxA !== -1 && idxB !== -1) return idxA - idxB;
          if (idxA !== -1) return -1;
          if (idxB !== -1) return 1;
          return a.localeCompare(b);
        });
        if (activeTab.includes('匯款')) {
           const d = arr.find(c => c.includes('日期')), u = arr.find(c => c.match(/戶別|編號/)), a = arr.find(c => c.includes('金額'));
           return [d, u, a].filter(Boolean);
        }
        return arr;
      }, [filteredDisplayData, activeTab]);

      const rowSpans = useMemo(() => {
          const spans = {};
          if (activeTab.match(/匯款|換約|聯絡|客戶/)) return spans;
          filteredDisplayData.forEach(row => { const key = `${normStr(row['樓層'])}_${normStr(row['編號'])}`; spans[key] = (spans[key] || 0) + 1; });
          return spans;
      }, [filteredDisplayData, activeTab]);

      const columnTotals = useMemo(() => {
          const totals = {};
          if (activeTab.match(/匯款|換約|聯絡|客戶/)) return totals;
          currentColumns.forEach(col => {
              if (['樓層', '編號', '買方'].includes(col) || col === '成交總價') { if (col !== '成交總價') return; }
              let sum = 0, hasVal = false;
              filteredDisplayData.forEach((row, idx) => {
                  if (col === '成交總價') { 
                    const pK = idx > 0 ? `${normStr(filteredDisplayData[idx-1]['樓層'])}_${normStr(filteredDisplayData[idx-1]['編號'])}` : null; 
                    if (`${normStr(row['樓層'])}_${normStr(row['編號'])}` === pK) return; 
                  }
                  const val = row[col]; if (val && String(val).trim() !== '') { 
                    const num = parseFloat(String(val).replace(/,/g, '')); if (!isNaN(num)) { sum += num; hasVal = true; } 
                  }
              });
              if (hasVal) totals[col] = sum;
          });
          return totals;
      }, [filteredDisplayData, currentColumns, activeTab]);

      const openUnitDetails = (tF, tU, dB) => {
        const uK = `${tF}_${tU}`;
        const info = { 基本資料: { 樓層: tF, 編號: tU, 買方: dB }, 財務款項: { house: {}, land: {} }, 客戶資料: {}, 匯款紀錄: [], 換約紀錄: [], 其他標籤: [] };
        Object.keys(sheetsData).forEach(sN => {
          const sheet = sheetsData[sN];
          if (sN.includes("匯款")) { 
            info.匯款紀錄.push(...sheet.filter(r => { const unit = parseUnitInfo(r); return unit.f === tF && unit.u === tU; })); 
            return; 
          }
          if (sN.match(/換約|讓渡/)) { 
            info.換約紀錄.push(...sheet.filter(r => { const unit = parseUnitInfo(r); return unit.f === tF && unit.u === tU; })); 
            return; 
          }
          const matches = sheet.filter(r => normStr(r['樓層']) === tF && normStr(r['編號']) === tU);
          if (matches.length > 0) {
            if (sN.match(/款項|財務|收款/)) { info.財務款項.house = matches.find(m => Object.values(m).some(v => String(v).includes('房屋'))) || matches[0]; info.財務款項.land = matches.find(m => Object.values(m).some(v => String(v).includes('土地'))) || {}; }
            else if (sN.match(/客戶|聯絡/)) info.客戶資料 = matches[0];
            else info.其他標籤.push({ sheetName: sN, data: matches });
          }
        });
        if (customData?.units?.[uK]) {
          const cu = customData.units[uK];
          if (cu.基本資料?.買方) info.基本資料.買方 = cu.基本資料.買方;
          info.客戶資料 = { ...info.客戶資料, ...cu.客戶資料 };
          info.財務款項.house = { ...info.財務款項.house, ...cu.house };
          info.財務款項.land = { ...info.財務款項.land, ...cu.land };
        }
        info.匯款紀錄.push(...(customData?.remittances || []).filter(r => r.unitKey === uK));
        setSelectedUnit(info);
      };

      const handleUpdateCustomUnit = async (cat, key, val) => {
         const uK = `${selectedUnit.基本資料.樓層}_${selectedUnit.基本資料.編號}`;
         const cU = customData.units?.[uK] || {};
         const uU = { ...customData.units, [uK]: { ...cU, [cat]: { ...(cU[cat] || {}), [key]: val } } };
         setCustomData(p => ({...p, units: uU}));
         setSelectedUnit(prev => { 
           if (cat === 'house' || cat === 'land') return { ...prev, 財務款項: { ...prev.財務款項, [cat]: { ...prev.財務款項[cat], [key]: val } } }; 
           if (cat === '基本資料') return { ...prev, 基本資料: { ...prev.基本資料, [key]: val } };
           return { ...prev, [cat]: { ...prev[cat], [key]: val } };
         });
         if (user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'custom', 'additions'), { units: uU }, { merge: true });
      };

      const handleInvoiceChange = async (rK, f, v) => {
        setFirebaseInvoices(prev => ({ ...prev, [rK]: { ...(prev[rK] || {}), [f]: v } }));
        if (user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'invoices', 'all_invoices'), { [rK]: { [f]: v } }, { merge: true });
      };

      if (!user) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-[#F5F5F0] font-sans">
            <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-10 text-center border">
               <Home className="mx-auto text-[#8C9B90] mb-6" size={48} />
               <h1 className="text-2xl font-bold mb-8">青森苑管理系統</h1>
               <button onClick={handleGoogleLogin} disabled={isLoggingIn} className="w-full flex items-center justify-center gap-2 bg-white border py-3 rounded-xl shadow-sm hover:bg-gray-50 active:scale-95 transition-all font-bold">{isLoggingIn ? <RefreshCw className="animate-spin text-gray-400" /> : <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" />} 使用 Google 帳號登入</button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#F5F5F0] text-[#4A4A4A] pb-10 font-sans selection:bg-[#8C9B90] selection:text-white">
          <header className="bg-white shadow-sm border-b sticky top-0 z-[60] px-4 sm:px-8 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
            <div className="flex flex-col sm:flex-row items-center gap-4">
              <div className="flex items-center gap-2"><div className="bg-[#8C9B90] p-1.5 rounded-lg text-white shadow-md"><Home size={20} /></div><h1 className="text-lg font-bold tracking-tight">青森苑系統</h1></div>
              <div className="flex items-center gap-2 px-3 py-1 bg-gray-50 border rounded-full">
                <Database size={12} className={cloudStatus === "synced" ? "text-green-500" : cloudStatus === "loading" ? "text-orange-400 animate-spin" : "text-gray-400"} />
                <span className="text-[10px] font-bold uppercase tracking-wider text-gray-500">{cloudStatus === "synced" ? "雲端已同步" : cloudStatus === "loading" ? "同步中..." : "尚未匯入"}</span>
              </div>
            </div>
            <div className="flex items-center gap-3">
              <div className="relative"><Search className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={14} /><input type="text" placeholder="搜尋..." className="pl-9 pr-4 py-1.5 bg-[#F5F5F0] border border-transparent focus:border-[#8C9B90] rounded-full text-xs outline-none transition-all w-48 sm:w-64" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} /></div>
              <button onClick={() => setShowAddUnitModal(true)} className="bg-white border border-[#8C9B90] text-[#8C9B90] px-3 py-1.5 rounded-full text-[11px] font-bold hover:bg-[#8C9B90] hover:text-white transition-all shadow-sm flex items-center gap-1"><Plus size={12} />雲端新增</button>
              <label className="cursor-pointer bg-[#8C9B90] text-white px-3 py-1.5 rounded-full text-[11px] font-bold hover:bg-[#7A8A7E] shadow-sm flex items-center gap-1"><Upload size={12} /> 匯入 Excel<input type="file" accept=".xlsx, .xls, .csv" className="hidden" onChange={handleFileUpload} /></label>
              <div className="flex items-center gap-2 pl-3 border-l ml-1"><img src={user?.photoURL} className="w-7 h-7 rounded-full border shadow-sm" /><button onClick={handleLogout} className="p-1.5 text-gray-400 hover:text-red-500 transition-all"><LogOut size={18} /></button></div>
            </div>
          </header>

          <div className="max-w-full mx-auto px-2 sm:px-6 py-4">
            
            {/* 上方極簡財務統計條 */}
            <div className="flex flex-wrap items-center gap-x-5 gap-y-1.5 mb-3 bg-white px-4 py-2 rounded-xl shadow-sm border border-[#D4C9B9]/30">
              <div className="flex items-center gap-2"><TrendingUp size={14} className="text-[#8C9B90]"/><span className="text-[10px] text-gray-400 font-bold">總成交:</span><span className="font-bold text-sm text-gray-700">{projectStats.total.toLocaleString()}</span></div>
              <div className="flex items-center gap-2"><CreditCard size={14} className="text-green-500"/><span className="text-[10px] text-gray-400 font-bold">已實收:</span><span className="font-bold text-sm text-green-600">{projectStats.received.toLocaleString()}</span></div>
              <div className="flex items-center gap-2"><Clock size={14} className="text-orange-400"/><span className="text-[10px] text-gray-400 font-bold">未收餘額:</span><span className="font-bold text-sm text-orange-500">{projectStats.outstanding.toLocaleString()}</span></div>
            </div>

            <div className="flex overflow-x-auto pb-1 mb-2 gap-2 border-b border-gray-200">
              {Object.keys(sheetsData).sort((a,b)=>a.includes('收款總表')?-1:b.includes('收款總表')?1:0).map(t => <button key={t} onClick={() => setActiveTab(t)} className={`px-4 py-1.5 rounded-t-lg font-medium text-[11px] whitespace-nowrap transition-all ${ activeTab === t ? 'bg-white text-[#8C9B90] border-t-2 border-l border-r border-[#8C9B90]' : 'text-gray-400' }`}>{t}</button>)}
            </div>
            
            <div className="bg-white rounded-xl shadow-sm border border-[#D4C9B9]/20 overflow-hidden">
              <div className="overflow-auto relative max-h-[78vh] scrollbar-hide">
                <table className="w-full text-left border-collapse">
                  <thead className="sticky top-0 z-[45]">
                    <tr className="text-[10px] text-gray-500 font-bold tracking-tight bg-[#F9F9F8]">
                      {/* 操作列固定寬度 */}
                      <th className="w-11 px-1 py-3 sticky left-0 top-0 bg-[#F9F9F8] z-50 text-center border-r border-b">操作</th>
                      {currentColumns.map((c, i) => {
                        const isUnitInfo = ['樓層', '編號', '買方'].includes(c);
                        // 校正後的窄版固定位移量
                        const leftOffset = c === '樓層' ? '44px' : c === '編號' ? '80px' : c === '買方' ? '116px' : '0px';
                        const colWidth = isUnitInfo ? (c === '買方' ? 'w-24' : 'w-9') : 'w-auto';
                        
                        return (
                          <th key={i} 
                              style={isUnitInfo ? { left: leftOffset } : {}}
                              className={`${colWidth} px-2 py-3 border-b ${isUnitInfo ? 'sticky z-50 bg-[#F9F9F8] border-r sticky-shadow' : 'bg-[#F9F9F8]'} ${getCategoryStyle(c).isCat ? getCategoryStyle(c).text : ''} data-cell-wrap`}>
                            {c}
                          </th>
                        );
                      })}
                    </tr>
                  </thead>
                  <tbody className="divide-y text-[11px]">
                    {filteredDisplayData.map((row, idx) => {
                      const unit = parseUnitInfo(row); const unitKey = `${unit.f}_${unit.u}`; const isM = Object.keys(rowSpans).length > 0;
                      const isF = !isM || unitKey !== (idx > 0 ? `${parseUnitInfo(filteredDisplayData[idx-1]).f}_${parseUnitInfo(filteredDisplayData[idx-1]).u}` : null);
                      const span = isM ? rowSpans[unitKey] : 1;
                      const catStr = row['房48%      土52%'] || row['款項種類'] || row['房48% 土52%'] || '';
                      const isTransferUnit = transferUnitKeys.has(unitKey);

                      return (
                        <tr key={idx} className={`hover:bg-[#F5F5F0]/50 transition-colors ${!unit.b ? 'opacity-60 bg-gray-50/30' : ''}`}>
                          {(!isM || isF) && (
                            <td rowSpan={span} className="px-1 py-2 sticky left-0 bg-white z-[35] border-r text-center align-middle sticky-shadow">
                              <button onClick={() => openUnitDetails(unit.f, unit.u, unit.b)} className="text-[9px] bg-[#D4C9B9] text-white px-1.5 py-0.5 rounded hover:bg-[#c3b6a3] transition-all">檢視</button>
                            </td>
                          )}
                          {currentColumns.map((col, i) => {
                            let cls = 'text-gray-600';
                            const catStyle = getCategoryStyle((col.includes('土地') || col.includes('建物')) ? col : catStr);
                            if (col.includes('買方')) cls = 'font-bold text-[#8C9B90]';
                            else if (catStyle.isCat) cls = `${catStyle.text} font-medium`;
                            
                            const isUnitInfo = ['樓層', '編號', '買方'].includes(col);
                            const leftOffset = col === '樓層' ? '44px' : col === '編號' ? '80px' : col === '買方' ? '116px' : '0px';

                            if (isM && ['樓層', '編號', '買方', '成交總價'].includes(col)) { 
                              if (!isF) return null; 
                              return (
                                <td key={i} rowSpan={span} 
                                    style={isUnitInfo ? { left: leftOffset } : {}}
                                    className={`px-2 py-2 align-middle border-r ${isUnitInfo ? 'sticky z-[30] bg-white' : ''} ${cls} data-cell-wrap`}>
                                  {renderDateIfApplicable(col, row[col])}
                                  {col === '編號' && isTransferUnit && <span className="ml-1 px-0.5 bg-orange-100 text-orange-600 text-[8px] font-bold rounded">換</span>}
                                </td>
                              ); 
                            }
                            return (
                              <td key={i} 
                                  style={isUnitInfo ? { left: leftOffset } : {}}
                                  className={`px-2 py-2 border-r ${isUnitInfo ? 'sticky z-[30] bg-white sticky-shadow' : ''} ${cls} data-cell-wrap`}>
                                {renderDateIfApplicable(col, row[col])}
                                {col === '編號' && isTransferUnit && !isM && <span className="ml-1 px-0.5 bg-orange-100 text-orange-600 text-[8px] font-bold rounded">換</span>}
                              </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                  {Object.keys(columnTotals).length > 0 && (
                    <tfoot className="sticky bottom-0 z-[45] bg-[#E8ECE9] font-bold border-t-2 border-[#8C9B90]">
                      <tr>
                        <td className="px-2 py-3 sticky left-0 bg-[#E8ECE9] border-r z-50 text-center text-[10px]">合計</td>
                        {currentColumns.map((col, i) => { 
                          const isUnitInfo = ['樓層', '編號', '買方'].includes(col);
                          const leftOffset = col === '樓層' ? '44px' : col === '編號' ? '80px' : col === '買方' ? '116px' : '0px';
                          const t = columnTotals[col]; 
                          return (
                            <td key={i} 
                                style={isUnitInfo ? { left: leftOffset } : {}}
                                className={`px-2 py-3 text-right border-r ${isUnitInfo ? 'sticky z-50 bg-[#E8ECE9]' : ''} ${col==='成交總價'?'text-[#8C9B90] text-[12px]':''} data-cell-wrap`}>
                              {t?t.toLocaleString():(isUnitInfo?'-':'')}
                            </td>
                          ); 
                        })}
                      </tr>
                    </tfoot>
                  )}
                </table>
              </div>
            </div>
          </div>

          {/* 其餘 Modal 元件 */}
          {showAddUnitModal && <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm"><div className="bg-white p-8 rounded-2xl w-96 shadow-2xl"><h3 className="font-bold mb-6 text-lg text-[#8C9B90] border-b pb-2">建立成交戶</h3><div className="space-y-4"><input id="new_u_f" className="border w-full p-3 rounded-xl outline-none focus:border-[#8C9B90]" placeholder="樓層" /><input id="new_u_u" className="border w-full p-3 rounded-xl outline-none focus:border-[#8C9B90]" placeholder="編號" /></div><div className="flex justify-end gap-3 mt-8"><button onClick={() => setShowAddUnitModal(false)} className="px-5 py-2.5 text-gray-400 text-sm hover:bg-gray-50 rounded-xl">取消</button><button onClick={() => { const f=document.getElementById('new_u_f').value, u=document.getElementById('new_u_u').value; if(f&&u){ const k=`${normStr(f)}_${normStr(u)}`; const cu={...customData.units, [k]:{ 基本資料:{ 樓層:normStr(f), 編號:normStr(u), 買方: "新客戶" }}}; setCustomData(p=>({...p, units:cu})); if(user) setDoc(doc(db,'artifacts',appId,'public', 'data','custom','additions'), {units:cu}, {merge:true}); setShowAddUnitModal(false); openUnitDetails(normStr(f), normStr(u), "新客戶"); setIsEditingMode(true); } }} className="bg-[#8C9B90] text-white px-6 py-2.5 rounded-xl text-sm font-bold shadow-md hover:bg-[#7A8A7E]">建立</button></div></div></div>}

          {selectedUnit && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-5xl max-h-[95vh] flex flex-col overflow-hidden animate-in zoom-in-95 duration-200 border border-white/20">
                <div className="flex justify-between items-center px-6 py-4 border-b bg-[#F9F9F8]"><div className="flex items-center gap-4"><div className="bg-[#8C9B90] text-white text-xl font-bold h-12 px-4 rounded-xl flex items-center justify-center shadow-inner">{selectedUnit.基本資料.樓層}{selectedUnit.基本資料.編號}</div><div><h2 className="text-lg font-bold text-[#4A4A4A]">{selectedUnit.基本資料.買方||'無買方資料'}</h2><p className="text-[10px] text-[#8C9B90] uppercase tracking-widest font-bold">雲端帳戶同步中</p></div></div><div className="flex gap-3"><button onClick={()=>setIsEditingMode(!isEditingMode)} className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all active:scale-95 shadow-sm ${isEditingMode?'bg-orange-500 text-white':'bg-white border text-gray-600 hover:bg-gray-50'}`}>{isEditingMode?'💾 儲存退出':'✏️ 編輯資料'}</button><button onClick={()=>{setSelectedUnit(null);setIsEditingMode(false);}} className="text-gray-400 p-2 hover:bg-gray-100 rounded-full transition-all"><X size={20}/></button></div></div>
                <div className="flex-1 overflow-y-auto p-6 bg-gray-50/50 scrollbar-hide">
                  <div className="grid grid-cols-1 gap-6">
                    <div className="bg-white p-5 rounded-xl border shadow-sm">
                      <h3 className="text-xs font-bold text-[#8C9B90] mb-4 border-b pb-2 flex items-center gap-2"><User size={14}/>聯絡資料</h3>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-2">
                        {Object.entries(selectedUnit.客戶資料).map(([k,v]) => { 
                          if (['樓層','編號','買方'].includes(k) || k.startsWith('__EMPTY')) return null; 
                          if (!isEditingMode && (!v || String(v).trim() === "")) return null; 
                          return (
                            <div key={k} className="flex justify-between text-xs border-b border-gray-50 pb-1.5">
                              <span className="text-gray-400">{k}</span>
                              <span className="font-medium text-[#4A4A4A] text-right data-cell-wrap">{renderDateIfApplicable(k,v)}</span>
                            </div>
                          ); 
                        })}
                      </div>
                    </div>
                    <div className="bg-white p-5 rounded-xl border shadow-sm md:col-span-1"><h3 className="text-xs font-bold text-[#8C9B90] mb-4 border-b pb-2 flex items-center gap-2"><DollarSign size={14}/>財務款項沖銷明細</h3><div className="overflow-x-auto"><table className="w-full text-[10px] text-left border-separate border-spacing-y-1"><thead><tr className="text-gray-400 font-bold"><th>階段</th><th className="text-right px-2">房屋款</th><th className="text-right px-2">土地款</th><th className="text-right px-2">合計</th><th className="text-right px-2 text-[#8C9B90]">已付</th><th className="text-right px-2 text-red-500">未付</th><th className="text-center px-2">狀態</th></tr></thead><tbody>
                            {(() => {
                              const house = selectedUnit.財務款項.house || {}, land = selectedUnit.財務款項.land || {};
                              const totalP = (selectedUnit.匯款紀錄 || []).reduce((s,r) => { const aK = Object.keys(r).find(key=>key.includes('金額'))||'金額'; return s + (parseFloat(String(r[aK]).replace(/,/g,''))||0); }, 0);
                              let rem = totalP;
                              return [ {k:'成交',l:'總價'}, {k:'訂金',l:'訂金'}, {k:'簽約',l:'簽約金'}, {k:'2F',l:'2F工程'}, {k:'5F',l:'5F工程'}, {k:'7F',l:'7F工程'}, {k:'10F',l:'10F工程'}, {k:'13F',l:'13F工程'}, {k:'使照',l:'使照'}, {k:'銀貸',l:'銀貸'}, {k:'交屋',l:'交屋'} ].map(st => {
                                const hA = parseFloat(String(house[Object.keys(house).find(x=>x.includes(st.k) && (st.k==='成交'?!x.includes('總價'):true))]||0).replace(/,/g,''))||0;
                                const lA = parseFloat(String(land[Object.keys(land).find(x=>x.includes(st.k) && (st.k==='成交'?!x.includes('總價'):true))]||0).replace(/,/g,''))||0;
                                const exp = hA + lA; if (exp <= 0 && st.k !== '成交') return null;
                                let paid = 0; if (st.k !== '成交') { if(rem >= exp) { paid = exp; rem -= exp; } else { paid = rem; rem = 0; } }
                                const isOk = paid >= exp && exp > 0; const isPart = paid > 0 && paid < exp;
                                return <tr key={st.k} className={`${st.k==='成交'?"bg-gray-50":isOk?"bg-green-50/70":isPart?"bg-orange-50/70":"hover:bg-gray-50/30"} transition-all rounded-lg`}><td className="py-2 px-2 font-bold">{st.l}</td><td className="text-right px-2 text-sky-700">{hA?hA.toLocaleString():''}</td><td className="text-right px-2 text-amber-700">{lA?lA.toLocaleString():''}</td><td className="text-right px-2 font-bold">{exp?exp.toLocaleString():''}</td><td className="text-right px-2 text-green-600 font-bold">{st.k==='成交'?'':paid?paid.toLocaleString():''}</td><td className="text-right px-2 text-red-500">{st.k==='成交'?'':(exp-paid)?(exp-paid).toLocaleString():''}</td><td className="text-center px-2 rounded-r-lg">{st.k==='成交'?'':(isOk?<span className="bg-green-100 text-green-700 px-1 py-0.5 rounded-full text-[8px] font-bold">已清</span>:isPart?<span className="bg-orange-100 text-orange-700 px-1 py-0.5 rounded-full text-[8px] font-bold">未清</span>:<span className="text-gray-300">未付</span>)}</td></tr>;
                              });
                            })()}</tbody></table></div></div>
                    <div className="bg-white p-5 rounded-xl border shadow-sm relative overflow-hidden"><h3 className="text-xs font-bold text-[#8C9B90] mb-4 border-b pb-2 flex items-center gap-2"><FileText size={14}/>匯款紀錄管理</h3><div className="overflow-x-auto"><table className="w-full text-[10px] text-left border-separate border-spacing-y-1"><thead><tr className="bg-gray-50 text-gray-400 font-bold"> <th className="px-2 py-2">日期</th> <th className="px-2 py-2">匯款人</th> <th className="text-right px-2 py-2">金額 (NT$)</th> <th className="bg-blue-50/30 px-2 py-2">發票日期</th> <th className="bg-blue-50/30 px-2 py-2">發票號碼</th> <th className="text-center px-2 py-2">管理</th> </tr></thead><tbody>
                      {selectedUnit.匯款紀錄.map((r,i) => {
                              const dK = Object.keys(r).find(k=>k.includes('日期'))||'日期', nK = Object.keys(r).find(k=>k.includes('匯款人'))||'匯款人', aK = Object.keys(r).find(k=>k.includes('金額'))||'金額', amt = parseFloat(String(r[aK]).replace(/,/g,''))||0;
                              const unit = parseUnitInfo(r);
                              const rK = r._isCustom ? r.id : `${unit.f}${unit.u}_${unit.b}_${amt}`;
                              const cD = firebaseInvoices[rK] || {};
                              return <tr key={i} className={`hover:bg-gray-50/50 ${r._isCustom?'bg-blue-50/10':''} rounded-lg transition-all`}><td className="px-2 py-2">{renderDateIfApplicable(dK,r[dK])} {r._isCustom && <span className="ml-1 text-[8px] bg-blue-100 text-blue-600 px-1 rounded font-bold">手</span>}</td><td className="px-2 py-2 font-medium">{r[nK] || '-'}</td><td className="text-right px-2 font-bold">{amt.toLocaleString()}</td><td className="px-2"><input type="date" className="border-none bg-transparent w-full text-[10px] focus:ring-0" value={cD['發票日期']||''} onChange={e=>handleInvoiceChange(rK,'發票日期',e.target.value)}/></td><td className="px-2"><input type="text" className="border-none bg-transparent w-full text-[10px] focus:ring-0" placeholder="號碼" value={cD['發票號碼']||''} onChange={e=>handleInvoiceChange(rK,'發票號碼',e.target.value)}/></td><td className="text-center px-2">{r._isCustom && <button onClick={async ()=>{if(!confirm("刪除？"))return;const uR=customData.remittances.filter(x=>x.id!==r.id);setCustomData(p=>({...p,remittances:uR}));if(user)await setDoc(doc(db,'artifacts',appId,'public','data','custom','additions'),{remittances:uR},{merge:true});}} className="text-red-300 hover:text-red-500"><Trash2 size={12}/></button>}</td></tr>;
                      })}
                      <tr className="bg-blue-50/20 rounded-xl overflow-hidden">
                         <td className="p-1.5"><input id="remit_date" type="date" className="border border-blue-100 rounded text-[9px] w-full p-1 outline-none bg-white"/></td>
                         <td className="p-1.5"><input id="remit_name" placeholder="人名" className="border border-blue-100 rounded text-[9px] w-full p-1 outline-none bg-white"/></td>
                         <td className="p-1.5"><input id="remit_amt" type="number" placeholder="金額" className="border border-blue-100 rounded text-[9px] w-full p-1 text-right outline-none bg-white"/></td>
                         <td colSpan="3" className="p-1.5 text-right"><button onClick={async () => {
                              const d=document.getElementById('remit_date').value, n=document.getElementById('remit_name').value, a=document.getElementById('remit_amt').value;
                              if (a) {
                                 const rec = { unitKey:`${selectedUnit.基本資料.樓層}_${selectedUnit.基本資料.編號}`, 匯款日期:d.replace(/-/g,'/'), 匯款人:n, 匯款金額:Number(a), _isCustom:true, id:Date.now().toString() };
                                 const uR = [...(customData.remittances || []), rec]; setCustomData(p=>({...p, remittances:uR})); setSelectedUnit(p=>({...p, 匯款紀錄:[...p.匯款紀錄, rec]}));
                                 if(user) await setDoc(doc(db,'artifacts',appId,'public', 'data','custom','additions'), { remittances:uR }, { merge:true });
                                 document.getElementById('remit_date').value = ''; document.getElementById('remit_name').value = ''; document.getElementById('remit_amt').value = '';
                              }
                           }} className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded text-[9px] font-bold shadow-md transition-all active:scale-95">新增</button></td>
                      </tr>
                    </tbody></table></div></div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }
    const root = createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
