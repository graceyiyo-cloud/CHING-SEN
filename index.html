<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青森苑 案場管理系統</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>
</head>
<body class="bg-[#F5F5F0]">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Upload, Search, X, Home, User, Phone, MapPin, FileText, DollarSign, Layers, Cloud, RefreshCw, Plus } from 'lucide-react';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
    import { getFirestore, doc, setDoc, onSnapshot } from 'firebase/firestore';

    const userFirebaseConfig = {
      apiKey: "AIzaSyDREvduzrja4xjF-RCpKa-qv45JZCw9tjI",
      authDomain: "gen-lang-client-0168131217.firebaseapp.com",
      projectId: "gen-lang-client-0168131217",
      storageBucket: "gen-lang-client-0168131217.firebasestorage.app",
      messagingSenderId: "620488371764",
      appId: "1:620488371764:web:d5eb9d1dff62d66bab2461"
    };

    const firebaseConfig = typeof window !== 'undefined' && window.__firebase_config ? JSON.parse(window.__firebase_config) : userFirebaseConfig;
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof window !== 'undefined' && window.__app_id ? window.__app_id : 'qingsenyuan-admin';
    const initialAuthToken = typeof window !== 'undefined' && window.__initial_auth_token ? window.__initial_auth_token : null;

    const defaultData = { "請點擊右上角匯入 Excel": [] };

    // ==========================================
    // 日期格式化與通用工具
    // ==========================================
    const normStr = (s) => String(s || '').trim().replace(/\.0$/, '').toUpperCase();

    const renderDateIfApplicable = (key, val) => {
      if (val === undefined || val === null || val === '') return '-';
      const sVal = String(val).trim();
      if ((String(key).includes('日') || String(key).includes('時間戳記')) && sVal !== '') {
        const num = Number(sVal);
        if (!isNaN(num) && num > 20000 && num < 80000) {
          const date = new Date(Math.round((num - 25569) * 86400 * 1000));
          return `${date.getUTCFullYear()}/${String(date.getUTCMonth() + 1).padStart(2, '0')}/${String(date.getUTCDate()).padStart(2, '0')}`;
        }
      }
      return sVal;
    };

    // ==========================================
    // 核心升級：專屬顏色判定引擎 (修正車位優先級)
    // ==========================================
    const getCategoryStyle = (text) => {
      const s = String(text || '');
      
      // 1. 車位優先判斷 (即使裡面有包含「土地持分」字眼，只要屬於車位，就標示為車位顏色)
      if (s.includes('車位')) return { isCat: true, text: 'text-purple-700', bg: 'bg-purple-50', border: 'border-purple-200' };
      
      // 2. 建物 / 房屋 -> 晴空灰藍
      if (s.includes('建物') || s.includes('房屋')) return { isCat: true, text: 'text-sky-700', bg: 'bg-sky-50', border: 'border-sky-200' };
      
      // 3. 土地 -> 琥珀橘褐
      if (s.includes('土地')) return { isCat: true, text: 'text-amber-700', bg: 'bg-amber-50', border: 'border-amber-200' };
      
      // 預設樣式
      return { isCat: false, text: 'text-gray-800', bg: 'bg-[#F5F5F0]/50', border: 'border-[#D4C9B9]/20' };
    };

    function App() {
      const [sheetsData, setSheetsData] = useState(defaultData);
      const [activeTab, setActiveTab] = useState("請點擊右上角匯入 Excel");
      const [searchTerm, setSearchTerm] = useState("");
      const [selectedUnit, setSelectedUnit] = useState(null);
      const [isEditingMode, setIsEditingMode] = useState(false);
      const [showAddUnitModal, setShowAddUnitModal] = useState(false);
      
      const [isLoading, setIsLoading] = useState(false);
      const [user, setUser] = useState(null);
      
      const [editingRemitId, setEditingRemitId] = useState(null);
      const [editingRemitData, setEditingRemitData] = useState({ date: '', amt: '' });

      const [firebaseInvoices, setFirebaseInvoices] = useState({});
      const [customData, setCustomData] = useState({ units: {}, remittances: [] });

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (initialAuthToken) await signInWithCustomToken(auth, initialAuthToken);
            else await signInAnonymously(auth);
          } catch (error) { console.error("Firebase Auth Error:", error); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const invoiceDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'invoices', 'all_invoices');
        const unsubInv = onSnapshot(invoiceDocRef, (snapshot) => {
          if (snapshot.exists()) setFirebaseInvoices(snapshot.data());
        });

        const customDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'custom', 'additions');
        const unsubCustom = onSnapshot(customDocRef, (snapshot) => {
          if (snapshot.exists()) setCustomData(snapshot.data());
          else setCustomData({ units: {}, remittances: [] });
        });
        
        return () => { unsubInv(); unsubCustom(); };
      }, [user]);

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setIsLoading(true);
        const reader = new FileReader();
        reader.onload = (evt) => {
          const bstr = evt.target.result;
          const wb = window.XLSX.read(bstr, { type: 'binary' });
          
          const newData = {};
          wb.SheetNames.forEach(name => {
            const ws = wb.Sheets[name];
            const rawData = window.XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
            if (rawData.length === 0) return;

            let headerRowIdx = 0;
            for (let i = 0; i < Math.min(10, rawData.length); i++) {
              if (!rawData[i]) continue;
              const rowStr = rawData[i].join('').toLowerCase();
              if (rowStr.includes('樓層') || rowStr.includes('編號') || rowStr.includes('戶別') || rowStr.includes('戶名') || rowStr.includes('讓渡日期')) {
                headerRowIdx = i; break;
              }
            }
            
            const headerRow = rawData[headerRowIdx] || [];
            
            for (let c = 0; c < headerRow.length; c++) {
              if (!headerRow[c] || String(headerRow[c]).trim() === "") {
                for (let up = headerRowIdx - 1; up >= 0; up--) {
                  if (rawData[up] && rawData[up][c] && String(rawData[up][c]).trim() !== "") {
                    headerRow[c] = rawData[up][c]; break;
                  }
                }
              }
            }
            
            const cleanHeaders = [];
            const seen = {};
            for (let c = 0; c < headerRow.length; c++) {
               let rawBase = headerRow[c];
               let base = rawBase ? String(rawBase).replace(/[\r\n\s]+/g, '').trim() : `__EMPTY_${c}`;
               
               let superCat = "";
               if (headerRowIdx > 0) {
                   for(let upC = c; upC >= 0; upC--) {
                       let val = rawData[headerRowIdx-1][upC];
                       if (val && String(val).trim() !== "") {
                           superCat = String(val).replace(/[\r\n\s]+/g, '').trim();
                           break;
                       }
                   }
               }
               
               let finalCat = base;
               if (!base.startsWith('__EMPTY') && superCat && (superCat.includes('土地') || superCat.includes('建物') || superCat.includes('車位') || superCat.includes('房屋'))) {
                   if (!base.includes(superCat)) {
                       finalCat = `${superCat}-${base}`;
                   }
               }

               if (seen[finalCat]) {
                   seen[finalCat]++;
                   finalCat = `${finalCat}_${seen[finalCat]}`;
               } else {
                   seen[finalCat] = 1;
               }
               cleanHeaders.push(finalCat);
            }

            const sheetJson = [];
            for (let r = headerRowIdx + 1; r < rawData.length; r++) {
              const rowArr = rawData[r];
              if (!rowArr || rowArr.length === 0 || rowArr.every(cell => cell === undefined || cell === null || cell === '')) continue;
              
              const rowObj = {};
              const maxCols = Math.max(cleanHeaders.length, rowArr.length);
              for (let c = 0; c < maxCols; c++) {
                const key = cleanHeaders[c] || `__EMPTY_${c}`;
                rowObj[key] = rowArr[c] !== undefined && rowArr[c] !== null ? rowArr[c] : "";
              }
              if (Object.values(rowObj).some(val => String(val).trim() !== "")) sheetJson.push(rowObj);
            }
            if (sheetJson.length > 0) newData[name] = sheetJson;
          });
          
          if (Object.keys(newData).length > 0) {
            setSheetsData(newData);
            setActiveTab(Object.keys(newData)[0]);
          } else alert("讀取失敗：無法解析 Excel 內容。");
          setIsLoading(false);
        };
        reader.readAsBinaryString(file);
      };

      const combinedData = useMemo(() => {
        let base = sheetsData[activeTab] ? [...sheetsData[activeTab]] : []; 
        
        if (customData && customData.units) {
            Object.keys(customData.units).forEach(key => {
                const cu = customData.units[key];
                if (!cu || !cu.基本資料) return;
                
                const f = cu.基本資料.樓層;
                const u = cu.基本資料.編號;
                const b = cu.基本資料.買方;

                const exists = base.find(r => normStr(r['樓層']) === normStr(f) && normStr(r['編號']) === normStr(u));
                if (!exists) {
                    const rowMock = { '樓層': f, '編號': u, '買方': b, '_isCustom': true };
                    base.push(rowMock);
                } else if (b) {
                   exists['買方'] = b;
                }
            });
        }
        
        return base.filter(row => {
          if (!searchTerm) return true;
          return Object.values(row).some(val => String(val).toLowerCase().includes(searchTerm.toLowerCase()));
        });
      }, [sheetsData, activeTab, searchTerm, customData]);

      const currentColumns = useMemo(() => {
        if (combinedData.length === 0) return [];
        const cols = new Set();
        combinedData.forEach(row => Object.keys(row).forEach(k => { if(k !== '_isCustom') cols.add(k) }));
        let colArray = Array.from(cols);

        if (activeTab.includes('匯款')) {
           const dateCol = colArray.find(c => c.includes('日期'));
           const unitCol = colArray.find(c => c.includes('戶別') || c.includes('戶名') || c.includes('編號'));
           const amtCol = colArray.find(c => c.includes('金額'));
           return [dateCol, unitCol, amtCol].filter(Boolean); 
        }
        return colArray;
      }, [combinedData, activeTab]);

      const mergeCols = ['樓層', '編號', '買方', '成交總價'];
      const rowSpans = useMemo(() => {
          const spans = {};
          if (activeTab.includes('匯款') || activeTab.includes('換約') || activeTab.includes('聯絡') || activeTab.includes('客戶') || activeTab.includes('坪數')) return spans;
          
          combinedData.forEach(row => {
              const key = `${normStr(row['樓層'])}_${normStr(row['編號'])}`;
              spans[key] = (spans[key] || 0) + 1;
          });
          return spans;
      }, [combinedData, activeTab]);

      const columnTotals = useMemo(() => {
          const totals = {};
          if (activeTab.includes('匯款') || activeTab.includes('換約') || activeTab.includes('聯絡') || activeTab.includes('客戶') || activeTab.includes('坪數')) return totals;

          currentColumns.forEach(col => {
              if (mergeCols.includes(col) && col !== '成交總價') return;
              
              let sum = 0;
              let hasVal = false;
              combinedData.forEach((row, idx) => {
                  if (col === '成交總價') {
                     const prevUnitKey = idx > 0 ? `${normStr(combinedData[idx-1]['樓層'])}_${normStr(combinedData[idx-1]['編號'])}` : null;
                     const unitKey = `${normStr(row['樓層'])}_${normStr(row['編號'])}`;
                     if (unitKey === prevUnitKey) return;
                  }

                  const val = row[col];
                  if (val !== undefined && val !== null && String(val).trim() !== '') {
                     const num = parseFloat(String(val).replace(/,/g, ''));
                     if (!isNaN(num)) { sum += num; hasVal = true; }
                  }
              });
              if (hasVal) totals[col] = sum;
          });
          return totals;
      }, [combinedData, currentColumns, activeTab]);

      const parseUnitInfo = (row) => {
        let f = row['樓層'];
        let u = row['編號'];
        let b = row['買方'] || row['姓名'] || row['匯款人'] || row['匯款人(匯款帳戶戶名)'] || '';

        if (!f && !u) {
          const combined = String(row['戶別'] || row['戶名'] || '').replace(/\s/g, '');
          const match = combined.match(/^(\d+)[樓Ff]?(.*)$/i);
          if (match) { f = match[1]; u = match[2]; } 
          else u = combined;
        }
        return { f: normStr(f), u: normStr(u), b: String(b).trim() };
      };

      const openUnitDetails = (targetF, targetU, defaultBuyer) => {
        const unitKey = `${targetF}_${targetU}`;
        
        const info = {
          基本資料: { 樓層: targetF, 編號: targetU, 買方: defaultBuyer },
          財務款項: { house: {}, land: {} },
          客戶資料: {},
          坪數車位: {},
          匯款紀錄: [],
          換約紀錄: [],
          其他標籤: []
        };

        Object.keys(sheetsData).forEach(sheetName => {
          const sheet = sheetsData[sheetName];
          if (sheetName.includes("匯款")) {
            const remits = sheet.filter(r => {
              const unitStr = normStr(r['戶別']).replace(/\s/g, ''); 
              return unitStr === `${targetF}樓${targetU}` || unitStr === `${targetF}F${targetU}` || unitStr === `${targetF}${targetU}`;
            });
            info.匯款紀錄.push(...remits);
            return; 
          }
          if (sheetName.includes("換約") || sheetName.includes("讓渡")) {
            const transfers = sheet.filter(r => {
              const unitStr = normStr(r['戶名'] || r['戶別'] || r['編號']).replace(/\s/g, ''); 
              return unitStr === `${targetF}${targetU}` || unitStr === `${targetF}樓${targetU}` || unitStr === `${targetF}F${targetU}`;
            });
            info.換約紀錄.push(...transfers);
            return; 
          }
          const matches = sheet.filter(r => normStr(r['樓層']) === targetF && normStr(r['編號']) === targetU);
          if (matches.length > 0) {
            if (sheetName.includes("款項") || sheetName.includes("財務") || sheetName.includes("收款")) {
              info.財務款項.house = matches.find(m => Object.values(m).some(v => String(v).includes('房屋'))) || matches[0];
              info.財務款項.land = matches.find(m => Object.values(m).some(v => String(v).includes('土地'))) || {};
            }
            else if (sheetName.includes("客戶") || sheetName.includes("聯絡")) info.客戶資料 = matches[0];
            else if (sheetName.includes("坪數") || sheetName.includes("車位")) info.坪數車位 = matches[0];
            else info.其他標籤.push({ sheetName, data: matches });
          }
        });

        const cu = customData.units?.[unitKey];
        if (cu) {
          if (cu.基本資料?.買方) info.基本資料.買方 = cu.基本資料.買方;
          info.客戶資料 = { ...info.客戶資料, ...cu.客戶資料 };
          info.坪數車位 = { ...info.坪數車位, ...cu.坪數車位 };
          info.財務款項.house = { ...info.財務款項.house, ...cu.house };
          info.財務款項.land = { ...info.財務款項.land, ...cu.land };
        }
        
        const cr = (customData.remittances || []).filter(r => r.unitKey === unitKey);
        info.匯款紀錄.push(...cr);

        setSelectedUnit(info);
      };

      const handleUpdateCustomUnit = async (category, key, value) => {
         const unitKey = `${selectedUnit.基本資料.樓層}_${selectedUnit.基本資料.編號}`;
         const currentUnitCustom = customData.units?.[unitKey] || { 基本資料:{}, 客戶資料:{}, 坪數車位:{}, house:{}, land:{} };
         
         const updatedCategory = { ...(currentUnitCustom[category] || {}), [key]: value };
         const updatedCustomUnits = {
            ...customData.units,
            [unitKey]: { ...currentUnitCustom, [category]: updatedCategory }
         };
         
         setCustomData(prev => ({...prev, units: updatedCustomUnits}));
         setSelectedUnit(prev => {
             if (category === 'house' || category === 'land') {
                 return { ...prev, 財務款項: { ...prev.財務款項, [category]: { ...prev.財務款項[category], [key]: value } } };
             }
             if (category === '基本資料') {
                 return { ...prev, 基本資料: { ...prev.基本資料, [key]: value } };
             }
             return { ...prev, [category]: { ...prev[category], [key]: value } };
         });

         if (user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'custom', 'additions'), { units: updatedCustomUnits }, { merge: true });
      };

      const AddFieldForm = ({ category }) => {
         const [k, setK] = useState('');
         const [v, setV] = useState('');
         return (
           <div className="flex flex-col sm:flex-row gap-2 mt-3 pt-3 border-t border-gray-100">
             <input placeholder="自訂新欄位名稱..." className="sm:w-1/3 border border-gray-200 p-1.5 rounded text-sm outline-none focus:border-[#8C9B90]" value={k} onChange={e=>setK(e.target.value)}/>
             <input placeholder="內容值..." className="sm:w-2/3 border border-gray-200 p-1.5 rounded text-sm outline-none focus:border-[#8C9B90]" value={v} onChange={e=>setV(e.target.value)}/>
             <button onClick={() => {
                if (k) { handleUpdateCustomUnit(category, k, v); setK(''); setV(''); }
             }} className="bg-[#8C9B90] text-white px-3 py-1.5 rounded text-sm whitespace-nowrap">新增</button>
           </div>
         )
      };

      const startEditRemit = (record) => {
          setEditingRemitId(record.id);
          const dateKey = Object.keys(record).find(k => k.includes('日期')) || '匯款日期';
          const amtKey = Object.keys(record).find(k => k.includes('金額')) || '匯款金額';
          
          let formattedDate = renderDateIfApplicable(dateKey, record[dateKey]);
          if (formattedDate.includes('/')) {
             formattedDate = formattedDate.replace(/\//g, '-'); 
          }

          setEditingRemitData({
              date: formattedDate,
              amt: record[amtKey]
          });
      };

      const saveEditRemit = async (record) => {
          const dateKey = Object.keys(record).find(k => k.includes('日期')) || '匯款日期';
          const amtKey = Object.keys(record).find(k => k.includes('金額')) || '匯款金額';

          const displayDate = editingRemitData.date.replace(/-/g, '/');

          const updatedRemits = customData.remittances.map(r => {
              if (r.id === record.id) {
                  return { ...r, [dateKey]: displayDate, [amtKey]: Number(editingRemitData.amt) };
              }
              return r;
          });
          setCustomData(prev => ({...prev, remittances: updatedRemits}));
          setSelectedUnit(prev => ({
              ...prev,
              匯款紀錄: prev.匯款紀錄.map(r => r.id === record.id ? { ...r, [dateKey]: displayDate, [amtKey]: Number(editingRemitData.amt) } : r)
          }));

          if (user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'custom', 'additions'), { remittances: updatedRemits }, { merge: true });
          setEditingRemitId(null);
      };

      const deleteRemit = async (id) => {
          if(!window.confirm("確定要刪除這筆匯款紀錄嗎？")) return;
          const updatedRemits = customData.remittances.filter(r => r.id !== id);
          setCustomData(prev => ({...prev, remittances: updatedRemits}));
          setSelectedUnit(prev => ({
              ...prev,
              匯款紀錄: prev.匯款紀錄.filter(r => r.id !== id)
          }));
          if (user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'custom', 'additions'), { remittances: updatedRemits }, { merge: true });
      };

      return (
        <div className="min-h-screen bg-[#F5F5F0] text-[#4A4A4A] font-sans selection:bg-[#8C9B90] selection:text-white pb-10">
          
          <header className="bg-white shadow-sm border-b border-[#D4C9B9]/50 sticky top-0 z-10">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
              <div className="flex flex-col sm:flex-row items-center gap-3">
                <div className="flex items-center gap-3">
                  <div className="bg-[#8C9B90] p-2 rounded-lg text-white">
                    <Home size={24} />
                  </div>
                  <h1 className="text-2xl font-bold tracking-wider text-[#4A4A4A]">青森苑<span className="text-[#8C9B90] text-sm ml-2 font-normal">案場管理系統</span></h1>
                </div>
                
                <div className="ml-2 px-3 py-1 bg-gray-50 rounded-full flex items-center gap-1.5 border border-gray-100">
                  <Cloud size={14} className={user ? "text-green-500" : "text-gray-400 animate-pulse"} />
                  <span className="text-xs font-medium text-gray-500">
                    {user ? "雲端資料庫已連線" : "連線中..."}
                  </span>
                </div>
              </div>
              
              <div className="flex flex-wrap items-center justify-center md:justify-end gap-3 w-full md:w-auto">
                <div className="relative flex-grow sm:flex-grow-0">
                  <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={18} />
                  <input 
                    type="text" 
                    placeholder="搜尋戶別、姓名、電話..."

                              ];

                              const getAmount = (dataObj, keyword) => {
                                const actualKey = Object.keys(dataObj).find(k => k.includes(keyword) && (keyword === '成交' ? !k.includes('總價') : true));
                                if (!actualKey || !dataObj[actualKey]) return 0;
                                return parseFloat(String(dataObj[actualKey]).replace(/,/g, '')) || 0;
                              };

                              let hasAnyData = false;

                              const rows = stages.map(stage => {
                                const houseAmt = getAmount(house, stage.key);
                                const landAmt = getAmount(land, stage.key);
                                const expectedTotal = houseAmt + landAmt;
                                
                                if (expectedTotal > 0 || houseAmt > 0 || landAmt > 0) hasAnyData = true;
                                const isTotalRow = stage.key === '成交';
                                
                                if (isEditingMode) {
                                   return (
                                     <tr key={stage.key} className="bg-white hover:bg-gray-50 transition-colors">
                                       <td className="py-2 px-4 whitespace-nowrap text-gray-700">{stage.label}</td>
                                       <td className="py-2 px-4 bg-sky-50/10"><input type="number" placeholder="0" className="w-full border border-sky-200 p-1.5 rounded text-right text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400" value={houseAmt || ''} onChange={(e) => handleUpdateCustomUnit('house', stage.saveKey, e.target.value ? Number(e.target.value) : '')} /></td>
                                       <td className="py-2 px-4 bg-amber-50/10"><input type="number" placeholder="0" className="w-full border border-amber-200 p-1.5 rounded text-right text-sm outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400" value={landAmt || ''} onChange={(e) => handleUpdateCustomUnit('land', stage.saveKey, e.target.value ? Number(e.target.value) : '')} /></td>
                                       <td colSpan="4" className="py-2 px-4 text-xs text-gray-400 whitespace-nowrap">雲端儲存，關閉編輯後重算</td>
                                     </tr>
                                   );
                                }

                                let paidAmt = 0;
                                let isFullyPaid = false;
                                let isPartiallyPaid = false;
                                
                                if (!isTotalRow && expectedTotal > 0) {
                                  if (currentRemainingRemittance >= expectedTotal) {
                                    paidAmt = expectedTotal;
                                    isFullyPaid = true;
                                    currentRemainingRemittance -= expectedTotal;
                                  } else if (currentRemainingRemittance > 0) {
                                    paidAmt = currentRemainingRemittance;
                                    isPartiallyPaid = true;
                                    currentRemainingRemittance = 0;
                                  }
                                }
                                
                                const unpaidAmt = isTotalRow ? 0 : (expectedTotal - paidAmt);

                                let rowBgClass = "hover:bg-gray-50/50";
                                if (isTotalRow) rowBgClass = "bg-[#F5F5F0]/50 font-semibold";
                                else if (isFullyPaid) rowBgClass = "bg-green-50/60 hover:bg-green-50";
                                else if (isPartiallyPaid) rowBgClass = "bg-orange-50/60 hover:bg-orange-50";

                                return (
                                  <tr key={stage.key} className={`${rowBgClass} transition-colors`}>
                                    <td className={`py-3 px-4 whitespace-nowrap ${isFullyPaid ? 'text-green-700 font-medium' : 'text-gray-600'}`}>{stage.label}</td>
                                    <td className={`py-3 px-4 text-right whitespace-nowrap bg-sky-50/10 ${isTotalRow ? 'text-sky-800' : 'text-sky-700 font-medium'}`}>
                                      {houseAmt ? houseAmt.toLocaleString() : '-'}
                                    </td>
                                    <td className={`py-3 px-4 text-right whitespace-nowrap bg-amber-50/10 ${isTotalRow ? 'text-amber-800' : 'text-amber-700 font-medium'}`}>
                                      {landAmt ? landAmt.toLocaleString() : '-'}
                                    </td>
                                    <td className={`py-3 px-4 text-right whitespace-nowrap ${isTotalRow ? 'text-[#8C9B90] text-base' : 'text-gray-800 font-medium'}`}>
                                      {expectedTotal ? expectedTotal.toLocaleString() : '-'}
                                    </td>
                                    <td className={`py-3 px-4 text-right whitespace-nowrap ${isFullyPaid ? 'text-green-600 font-medium' : isPartiallyPaid ? 'text-orange-600 font-medium' : 'text-gray-400'}`}>
                                      {!isTotalRow && paidAmt > 0 ? paidAmt.toLocaleString() : '-'}
                                    </td>
                                    <td className={`py-3 px-4 text-right whitespace-nowrap ${unpaidAmt > 0 ? 'text-red-500' : 'text-gray-400'}`}>
                                      {!isTotalRow && expectedTotal > 0 ? unpaidAmt.toLocaleString() : '-'}
                                    </td>
                                    <td className="py-3 px-4 text-center whitespace-nowrap">
                                      {!isTotalRow && expectedTotal > 0 && (
                                        isFullyPaid ? <span className="inline-block px-2 py-1 bg-green-100 text-green-700 text-xs rounded-full">已結清</span> :
                                        isPartiallyPaid ? <span className="inline-block px-2 py-1 bg-orange-100 text-orange-700 text-xs rounded-full">部分付款</span> :
                                        <span className="inline-block px-2 py-1 bg-gray-100 text-gray-500 text-xs rounded-full">未付</span>
                                      )}
                                    </td>
                                  </tr>
                                );
                              });

                              if (!hasAnyData && !isEditingMode) {
                                return <tr><td colSpan="7" className="py-8 text-center text-sm text-gray-400 italic">無相關款項紀錄</td></tr>;
                              }

                              return rows;
                            })()}
                          </tbody>
                        </table>
                      </div>
                    </div>

                    <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm lg:col-span-2 relative overflow-hidden">
                      <div className="flex justify-between items-center mb-4 border-b pb-2">
                        <h3 className="flex items-center gap-2 text-sm font-semibold text-[#8C9B90]">
                          <FileText size={16} /> 歷史匯款紀錄明細
                        </h3>
                        <span className="text-xs text-gray-400">所有變更與新增將自動綁定並儲存至 Firebase 雲端</span>
                      </div>
                      <div className="overflow-x-auto">
                        <table className="w-full text-sm text-left border-collapse">
                          <thead>
                            <tr className="bg-[#F9F9F8] text-gray-500 border-b border-gray-100">
                              <th className="py-3 px-4 font-medium whitespace-nowrap">匯款日期</th>
                              <th className="py-3 px-4 font-medium text-right whitespace-nowrap">匯款金額 (NT$)</th>
                              <th className="py-3 px-4 font-medium whitespace-nowrap bg-blue-50/50">發票日期</th>
                              <th className="py-3 px-4 font-medium whitespace-nowrap bg-blue-50/50">發票號碼</th>
                              <th className="py-3 px-4 font-medium whitespace-nowrap text-center">操作</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-gray-50">
                            {selectedUnit.匯款紀錄 && selectedUnit.匯款紀錄.length > 0 ? (
                              selectedUnit.匯款紀錄.map((record, idx) => {
                                const amtKey = Object.keys(record).find(k => k.includes('金額')) || '匯款金額';
                                const dateKey = Object.keys(record).find(k => k.includes('日期')) || '匯款日期';
                                const nameKey = Object.keys(record).find(k => k.includes('匯款人')) || '匯款人';
                                
                                const amt = parseFloat(String(record[amtKey]).replace(/,/g, '')) || 0;
                                const unitStr = record['戶別'] || '';
                                const nameStr = record[nameKey] || '';
                                
                                const recordKey = record._isCustom ? record.id : `${unitStr}_${nameStr}_${amt}`;
                                const cloudData = firebaseInvoices[recordKey] || {};
                                const currentInvoiceDate = cloudData['發票日期'] || '';
                                const currentInvoiceNo = cloudData['發票號碼'] || '';
                                
                                if (editingRemitId === record.id) {
                                   return (
                                     <tr key={idx} className="bg-blue-50/10">
                                       <td className="py-2 px-4 whitespace-nowrap"><input type="date" value={editingRemitData.date} onChange={(e)=>setEditingRemitData({...editingRemitData, date: e.target.value})} className="border border-[#8C9B90] p-1.5 rounded text-sm w-36 outline-none"/></td>
                                       <td className="py-2 px-4 whitespace-nowrap"><input type="number" value={editingRemitData.amt} onChange={(e)=>setEditingRemitData({...editingRemitData, amt: e.target.value})} className="border border-[#8C9B90] p-1.5 rounded text-sm w-32 text-right outline-none"/></td>
                                       <td colSpan="2" className="py-2 px-4 whitespace-nowrap text-xs text-gray-400">儲存後即可填寫發票資訊</td>
                                       <td className="py-2 px-4 whitespace-nowrap text-center">
                                          <button onClick={() => saveEditRemit(record)} className="text-green-600 hover:text-green-800 font-medium px-2 py-1">儲存</button>
                                          <button onClick={() => setEditingRemitId(null)} className="text-gray-400 hover:text-gray-600 font-medium px-2 py-1">取消</button>
                                       </td>
                                     </tr>
                                   )
                                }

                                return (
                                  <tr key={idx} className={`transition-colors ${record._isCustom ? 'bg-blue-50/20 hover:bg-blue-50/50' : 'hover:bg-gray-50/50'}`}>
                                    <td className="py-3 px-4 text-gray-700 whitespace-nowrap">{renderDateIfApplicable(dateKey, record[dateKey])} {record._isCustom && <span className="ml-2 text-[10px] bg-blue-100 text-blue-600 px-1 rounded">手動新增</span>}</td>
                                    <td className="py-3 px-4 text-right font-medium text-gray-800 whitespace-nowrap">
                                      {amt ? amt.toLocaleString() : '-'}
                                    </td>
                                    <td className="py-2 px-4 whitespace-nowrap">
                                      <input 
                                        type="date" 
                                        value={currentInvoiceDate} 
                                        onChange={(e) => handleInvoiceChange(recordKey, '發票日期', e.target.value)}
                                        className="px-3 py-1.5 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-[#8C9B90] focus:border-[#8C9B90] text-gray-600 bg-white"
                                      />
                                    </td>
                                    <td className="py-2 px-4 whitespace-nowrap">
                                      <input 
                                        type="text" 
                                        placeholder="輸入號碼 (例: AB123...)"
                                        value={currentInvoiceNo} 
                                        onChange={(e) => handleInvoiceChange(recordKey, '發票號碼', e.target.value)}
                                        className="px-3 py-1.5 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-[#8C9B90] focus:border-[#8C9B90] w-40 text-gray-600 bg-white placeholder-gray-300"
                                      />
                                    </td>
                                    <td className="py-2 px-4 whitespace-nowrap text-center text-sm">
                                      {record._isCustom ? (
                                        <>
                                          <button onClick={() => startEditRemit(record)} className="text-blue-500 hover:text-blue-700 mx-1" title="編輯">✏️</button>
                                          <button onClick={() => deleteRemit(record.id)} className="text-red-500 hover:text-red-700 mx-1" title="刪除">🗑️</button>
                                        </>
                                      ) : <span className="text-gray-300">-</span>}
                                    </td>
                                  </tr>
                                );
                              })
                            ) : (
                              <tr>
                                <td colSpan="5" className="py-8 text-center text-sm text-gray-400 italic">該戶目前無匯款紀錄</td>
                              </tr>
                            )}
                            <tr className="bg-blue-50/40 border-t-2 border-blue-100">
                               <td className="py-2 px-4"><input id="remit_date" type="date" className="border border-blue-200 p-1.5 rounded text-sm w-36 outline-none focus:border-blue-400" title="匯款日期"/></td>
                               <td className="py-2 px-4"><input id="remit_amt" type="number" placeholder="金額 (純數字)" className="border border-blue-200 p-1.5 rounded text-sm w-full text-right outline-none focus:border-blue-400"/></td>
                               <td colSpan="3" className="py-2 px-4">
                                 <button onClick={async () => {
                                    const date = document.getElementById('remit_date').value;
                                    const amt = document.getElementById('remit_amt').value;
                                    if (amt) {
                                       const record = {
                                          unitKey: `${selectedUnit.基本資料.樓層}_${selectedUnit.基本資料.編號}`,
                                          匯款日期: date.replace(/-/g, '/'),
                                          匯款金額: Number(amt),
                                          _isCustom: true,
                                          id: Date.now().toString()
                                       };
                                       const updatedRemittances = [...(customData.remittances || []), record];
                                       setCustomData(prev => ({...prev, remittances: updatedRemittances}));
                                       setSelectedUnit(prev => ({...prev, 匯款紀錄: [...prev.匯款紀錄, record]}));
                                       
                                       if(user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'custom', 'additions'), { remittances: updatedRemittances }, { merge: true });
                                       
                                       document.getElementById('remit_date').value = '';
                                       document.getElementById('remit_amt').value = '';
                                    }
                                 }} className="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-colors shadow-sm flex items-center gap-1">
                                    <Plus size={14}/> 雲端新增匯款
                                 </button>
                               </td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    </div>

                  </div>
                );
              })()}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
